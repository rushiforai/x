<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ChexScore™ v2 | Hard Inquiries Only (Improved)</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.3.122/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f7; font-family: 'Roboto', sans-serif; padding: 24px 16px; color: #1e1e2f; }
        :root { --md-primary: #6750a4; --md-primary-light: #eaddff; --md-surface: #ffffff; --md-outline: #79747e; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: var(--md-surface); border-radius: 28px; padding: 24px 20px; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); margin-bottom: 24px; }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid #e9e9ef; padding-bottom: 12px; }
        .card-header .material-symbols-outlined { font-size: 28px; color: var(--md-primary); }
        .card-header h2 { font-size: 1.5rem; font-weight: 500; }
        .upload-zone { border: 2px dashed #cac4d0; border-radius: 28px; padding: 32px; text-align: center; cursor: pointer; background: #fefbff; margin-bottom: 20px; transition: all 0.2s; }
        .upload-zone:hover { border-color: var(--md-primary); background: #f9f6ff; }
        .upload-icon { font-size: 48px; color: var(--md-primary); }
        .file-input { display: none; }
        .btn { background: var(--md-primary); color: white; border: none; padding: 10px 24px; border-radius: 100px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--md-outline); color: var(--md-primary); }
        .btn-outline:hover { background: #ede7f6; }
        .btn-danger { background: #dc3545; color: white; border: none; }
        .btn-danger:hover { background: #b02a37; }
        .status-badge { background: #e8def8; border-radius: 100px; padding: 6px 12px; font-size: 0.75rem; color: #381e72; display: inline-flex; align-items: center; gap: 6px; }
        .progress-bar-container { margin: 16px 0; background: #e3e1e6; border-radius: 100px; height: 8px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--md-primary); transition: width 0.2s; }
        .tabs { display: flex; gap: 8px; border-bottom: 1px solid #e3e1e6; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; padding: 12px 20px; font-weight: 500; cursor: pointer; color: #49454e; border-radius: 100px 100px 0 0; }
        .tab-btn.active { background: #eaddff; color: #381e72; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 12px; margin: 16px 0; }
        .filter-input { padding: 8px 12px; border-radius: 100px; border: 1px solid var(--md-outline); font-family: inherit; flex: 1; min-width: 150px; }
        .table-wrapper { overflow-x: auto; margin-top: 16px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #e9e9ef; }
        th { cursor: pointer; background: #faf9fc; }
        .duplicate-row { background-color: #fff3e0; }
        .action-group { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
        .chart-container { max-width: 600px; margin: 20px 0; }
        .hidden { display: none; }
        .error-message { background: #ffdad6; color: #b3261e; border-radius: 16px; padding: 12px; margin-top: 16px; }
        .chexscore-card { background: linear-gradient(135deg, #1e2a3a 0%, #0f1724 100%); border-radius: 28px; padding: 20px; margin: 20px 0; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .score-number { font-size: 3rem; font-weight: 800; line-height: 1; }
        .risk-level { font-size: 1.2rem; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 100px; display: inline-block; margin-top: 8px; }
        .simulator-card { background: #faf9fc; border-radius: 24px; padding: 16px; margin-top: 16px; }
        .simulator-control { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
        .simulator-control input { padding: 8px 12px; border-radius: 100px; border: 1px solid var(--md-outline); width: 100px; }
        .history-chart { max-height: 200px; margin-top: 20px; }
        .calibration-slider { margin-top: 20px; padding-top: 12px; border-top: 1px solid #e3e1e6; }
        .calibration-slider input { width: 100%; max-width: 300px; }
        @media (max-width: 640px) { .card { padding: 16px; } th, td { font-size: 0.75rem; padding: 8px 4px; } .score-number { font-size: 2rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <span class="material-symbols-outlined">credit_score</span>
            <h2>ChexScore™ v2 (Hard Inquiries Only – Improved)</h2>
        </div>
        <div id="uploadZone" class="upload-zone">
            <span class="material-symbols-outlined upload-icon">cloud_upload</span>
            <div class="upload-text">Click or drag PDF (credit report)</div>
        </div>
        <input type="file" id="pdfInput" accept=".pdf" class="file-input" />
        <div class="progress-bar-container hidden" id="progressContainer">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="statusArea" class="status-badge">
            <span class="material-symbols-outlined">info</span>
            <span id="statusText">Ready</span>
        </div>
        <div id="errorContainer"></div>
        <div class="action-group">
            <button id="saveSessionBtn" class="btn-outline btn"><span class="material-symbols-outlined">save</span> Save Session</button>
            <button id="loadSessionBtn" class="btn-outline btn"><span class="material-symbols-outlined">restore</span> Load Last Session</button>
            <button id="deleteSessionBtn" class="btn-danger btn"><span class="material-symbols-outlined">delete</span> Delete Saved Sessions</button>
            <button id="exportExcelBtn" class="btn-outline btn"><span class="material-symbols-outlined">table_view</span> Export Excel</button>
        </div>
    </div>

    <div id="resultsCard" class="card hidden">
        <div class="tabs" id="tabs">
            <button class="tab-btn active" data-type="hard">Hard Inquiries (Viewed by Others)</button>
            <button class="tab-btn" data-type="soft">Soft Inquiries (Viewed Only by You)</button>
        </div>
        <div class="filter-bar">
            <input type="text" id="filterBank" placeholder="Filter by entity name" class="filter-input">
            <input type="text" id="filterDate" placeholder="Filter by date (MM/DD/YYYY)" class="filter-input">
            <button id="clearFilters" class="btn-outline btn">Clear Filters</button>
            <button id="mergeDuplicatesBtn" class="btn-outline btn">Merge Duplicates</button>
        </div>
        <div class="table-wrapper" id="tableContainer"></div>
        <div class="chart-container">
            <canvas id="inquiryChart"></canvas>
        </div>
        <div id="summaryStats"></div>
        
        <div id="chexscoreContainer" class="chexscore-card">
            <div>
                <div style="font-size:0.9rem; opacity:0.8;">Estimated ChexScore™</div>
                <div class="score-number" id="chexScoreValue">---</div>
                <div class="risk-level" id="chexRiskLevel">---</div>
                <div class="disclaimer" style="font-size:0.7rem;">*Calibrated with your 7 PDFs (v2)</div>
            </div>
            <div>
                <span class="material-symbols-outlined" style="font-size:40px;">analytics</span>
            </div>
        </div>

        <!-- What-If Simulator -->
        <div class="simulator-card">
            <h3 style="font-weight:500;">🎮 What‑If Simulator</h3>
            <div class="simulator-control">
                <label>➕ Extra hard inquiries (last 6 mo):</label>
                <input type="number" id="simExtraHard" value="0" min="0" max="20" step="1">
                <label>➕ Extra hard (last 12 mo):</label>
                <input type="number" id="simExtraHard12" value="0" min="0" max="30" step="1">
                <button id="applySimulation" class="btn-outline btn">Simulate</button>
                <button id="resetSimulation" class="btn-outline btn">Reset</button>
            </div>
            <div id="simResult" style="margin-top: 8px; font-size:0.9rem;"></div>
            
            <!-- Calibration slider (advanced) -->
            <div class="calibration-slider">
                <label>🔧 Calibration factor (0.8 – 1.2): </label>
                <input type="range" id="calibFactor" min="0.8" max="1.2" step="0.01" value="1.00">
                <span id="calibValue">1.00</span>
                <button id="resetCalib" class="btn-outline btn" style="margin-left:12px;">Reset</button>
            </div>

            <h3 style="font-weight:500; margin-top:20px;">📊 Score History (last 10)</h3>
            <div class="history-chart">
                <canvas id="scoreHistoryChart" width="400" height="150"></canvas>
            </div>
            <button id="clearHistoryBtn" class="btn-outline btn" style="margin-top:8px;">Clear History</button>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.3.122/pdf.worker.min.js';
    
    // ---------- Global state ----------
    let hardInquiries = [];
    let softInquiries = [];
    let currentTab = "hard";
    let chartInstance = null, historyChart = null;
    let scoreHistory = [];
    let currentFilterBank = "", currentFilterDate = "";
    let simExtraHard = 0, simExtraHard12 = 0;
    let calibFactor = 1.00;

    // DOM elements
    const pdfInput = document.getElementById('pdfInput');
    const uploadZone = document.getElementById('uploadZone');
    const statusSpan = document.getElementById('statusText');
    const errorDiv = document.getElementById('errorContainer');
    const resultsCard = document.getElementById('resultsCard');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const saveBtn = document.getElementById('saveSessionBtn');
    const loadBtn = document.getElementById('loadSessionBtn');
    const deleteSessionBtn = document.getElementById('deleteSessionBtn');
    const exportExcelBtn = document.getElementById('exportExcelBtn');
    const filterBankInput = document.getElementById('filterBank');
    const filterDateInput = document.getElementById('filterDate');
    const clearFiltersBtn = document.getElementById('clearFilters');
    const mergeDuplicatesBtn = document.getElementById('mergeDuplicatesBtn');
    const tableContainer = document.getElementById('tableContainer');
    const summaryStatsDiv = document.getElementById('summaryStats');
    const chexScoreSpan = document.getElementById('chexScoreValue');
    const chexRiskSpan = document.getElementById('chexRiskLevel');
    const simExtraHardInput = document.getElementById('simExtraHard');
    const simExtraHard12Input = document.getElementById('simExtraHard12');
    const applySimBtn = document.getElementById('applySimulation');
    const resetSimBtn = document.getElementById('resetSimulation');
    const simResultDiv = document.getElementById('simResult');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const calibSlider = document.getElementById('calibFactor');
    const calibValueSpan = document.getElementById('calibValue');
    const resetCalibBtn = document.getElementById('resetCalib');

    // Helper functions
    function showError(msg) { errorDiv.innerHTML = `<div class="error-message"><span class="material-symbols-outlined">error</span> ${msg}</div>`; statusSpan.innerText = "Error"; }
    function clearError() { errorDiv.innerHTML = ""; }
    function setStatus(text) { statusSpan.innerText = text; }
    function updateProgress(percent) { progressContainer.classList.remove('hidden'); progressBar.style.width = `${percent}%`; }
    function hideProgress() { progressContainer.classList.add('hidden'); progressBar.style.width = '0%'; }

    function normalizeDate(dateStr) {
        if (!dateStr) return null;
        let cleaned = dateStr.trim();
        let parts = cleaned.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if (parts) {
            let m = parseInt(parts[1],10), d = parseInt(parts[2],10), y = parseInt(parts[3],10);
            if (m>=1 && m<=12 && d>=1 && d<=31) return `${m.toString().padStart(2,'0')}/${d.toString().padStart(2,'0')}/${y}`;
        }
        const months = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
        let match = cleaned.match(/([A-Za-z]{3})\s+(\d{1,2}),?\s+(\d{4})/i);
        if(match){ let mon = months[match[1].toLowerCase()]; if(mon) return `${mon.toString().padStart(2,'0')}/${match[2].padStart(2,'0')}/${match[3]}`; }
        return cleaned;
    }

    // Improved scoring algorithm
    function calculateChexScore(hardArray, extraHard6=0, extraHard12=0) {
        const now = new Date(); now.setHours(0,0,0,0);
        const sixMonthsAgo = new Date(now); sixMonthsAgo.setMonth(now.getMonth() - 6);
        const twelveMonthsAgo = new Date(now); twelveMonthsAgo.setMonth(now.getMonth() - 12);

        let rawHard6 = 0, rawHard12 = 0;
        hardArray.forEach(inq => {
            let dateObj = inq._dateObj || (inq.inquiry_date ? new Date(normalizeDate(inq.inquiry_date)) : null);
            if (dateObj && !isNaN(dateObj)) {
                if (dateObj >= sixMonthsAgo) rawHard6++;
                if (dateObj >= twelveMonthsAgo) rawHard12++;
            }
        });
        rawHard6 += extraHard6;
        rawHard12 += extraHard12;

        const uniqueBanks6mo = new Set();
        hardArray.forEach(inq => {
            let dateObj = inq._dateObj || (inq.inquiry_date ? new Date(normalizeDate(inq.inquiry_date)) : null);
            if (dateObj && !isNaN(dateObj) && dateObj >= sixMonthsAgo) {
                uniqueBanks6mo.add(inq.bank_name);
            }
        });
        let uniqueHard6 = uniqueBanks6mo.size + extraHard6;
        let duplicateCount = rawHard6 - uniqueHard6;
        let duplicateBonus = 0;
        if (duplicateCount > 0) {
            if (rawHard6 <= 3) {
                duplicateBonus = duplicateCount * 20;
            } else {
                duplicateBonus = duplicateCount * 12;
            }
            duplicateBonus = Math.min(duplicateBonus, 60);
        }

        function getBaseDeduction(unique6, raw12) {
            const points = [
                { u6:1, r12:4, ded:264 },
                { u6:2, r12:6, ded:287 },
                { u6:3, r12:6, ded:302 },
                { u6:3, r12:8, ded:326 }
            ];
            let best = points[0];
            let minDist = Infinity;
            for (let p of points) {
                let dist = Math.abs(p.u6 - unique6) + Math.abs(p.r12 - raw12);
                if (dist < minDist) { minDist = dist; best = p; }
            }
            return best.ded;
        }
        let baseDeduction = getBaseDeduction(uniqueHard6, rawHard12);
        let totalDeduction = Math.max(0, baseDeduction - duplicateBonus);
        let rawScore = 899 - totalDeduction;
        let calibrated = 899 - (899 - rawScore) * calibFactor;
        let score = Math.min(899, Math.max(100, Math.round(calibrated)));
        let riskLevel = score >= 750 ? "Excellent" : (score >= 650 ? "Good" : (score >= 500 ? "Fair" : "Poor"));
        return { score, riskLevel, hard6: rawHard6, hard12: rawHard12, duplicateBonus };
    }

    function updateChexScoreDisplay(simExtra6=0, simExtra12=0) {
        if (!hardInquiries.length) {
            chexScoreSpan.innerText = "---"; chexRiskSpan.innerText = "No hard data";
            simResultDiv.innerHTML = "";
            return;
        }
        const { score, riskLevel } = calculateChexScore(hardInquiries, simExtra6, simExtra12);
        chexScoreSpan.innerText = score;
        chexRiskSpan.innerText = riskLevel;
        if (simExtra6 || simExtra12) {
            simResultDiv.innerHTML = `<span class="status-badge">🔮 Sim: +${simExtra6} hard (6m), +${simExtra12} hard (12m) → Score ${score} (${riskLevel})</span>`;
        } else {
            simResultDiv.innerHTML = "";
        }
        if (simExtra6===0 && simExtra12===0 && Math.abs(calibFactor - 1.00) < 0.01 && hardInquiries.length) {
            addToHistory(score);
        }
    }

    // History functions
    function addToHistory(score) {
        const now = new Date();
        const label = now.toLocaleTimeString();
        scoreHistory.unshift({ score, timestamp: now, label });
        if (scoreHistory.length > 10) scoreHistory.pop();
        updateHistoryChart();
    }
    function updateHistoryChart() {
        const ctx = document.getElementById('scoreHistoryChart').getContext('2d');
        if (historyChart) historyChart.destroy();
        const labels = scoreHistory.map(h => h.label).reverse();
        const dataPoints = scoreHistory.map(h => h.score).reverse();
        historyChart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ label: 'ChexScore', data: dataPoints, borderColor: '#6750a4', backgroundColor: 'rgba(103,80,164,0.1)', fill: true, tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: true }
        });
    }
    function clearHistory() { scoreHistory = []; updateHistoryChart(); setStatus("History cleared"); }

    // Duplicate detection & merge
    function findDuplicates(inquiries) {
        const map = new Map();
        inquiries.forEach((inq, idx) => { const key = `${inq.bank_name}|${inq.bank_phone}`; if (!map.has(key)) map.set(key, []); map.get(key).push(idx); });
        const dupSet = new Set();
        for (let indices of map.values()) if (indices.length > 1) indices.forEach(i => dupSet.add(i));
        return dupSet;
    }
    function mergeDuplicates(inquiries) {
        const map = new Map();
        for (let inq of inquiries) {
            const key = `${inq.bank_name}|${inq.bank_phone}`;
            if (!map.has(key)) map.set(key, { ...inq, count: 1 });
            else map.get(key).count++;
        }
        return Array.from(map.values()).map(({count, ...rest}) => rest);
    }

    function computeCumulativeStats(inquiries) {
        const now = new Date(); now.setHours(0,0,0,0);
        const cutoffs = [1,2,3,6,12,24].map(m => { let d=new Date(now); d.setMonth(now.getMonth()-m); return d; });
        let counts = [0,0,0,0,0,0];
        inquiries.forEach(inq => {
            let dateObj = inq._dateObj || (inq.inquiry_date ? new Date(normalizeDate(inq.inquiry_date)) : null);
            if (dateObj && !isNaN(dateObj)) for(let i=0; i<cutoffs.length; i++) if(dateObj >= cutoffs[i]) counts[i]++;
        });
        return { last1Month:counts[0], last2Months:counts[1], last3Months:counts[2], last6Months:counts[3], last12Months:counts[4], last24Months:counts[5] };
    }

    function renderCurrentTab() {
        let data = currentTab === "hard" ? hardInquiries : softInquiries;
        let filtered = data.filter(inq => {
            let matchBank = !currentFilterBank || inq.bank_name.toLowerCase().includes(currentFilterBank.toLowerCase());
            let matchDate = !currentFilterDate || (inq.inquiry_date && inq.inquiry_date.includes(currentFilterDate));
            return matchBank && matchDate;
        });
        const duplicatesSet = findDuplicates(filtered);
        let html = `<table><thead><tr><th data-sort="bank_name">Entity Name 🔽</th><th>Address</th><th>Phone</th><th>Date</th><th>Duplicate</th>${currentTab==="soft" ? '<th>Original Inquirer</th>' : ''}</thead><tbody>`;
        filtered.forEach((inq, idx) => {
            const isDup = duplicatesSet.has(idx) ? "⚠️ Yes" : "";
            const dupClass = duplicatesSet.has(idx) ? "duplicate-row" : "";
            html += `<tr class="${dupClass}"><td>${escapeHtml(inq.bank_name)}</td><td>${escapeHtml(inq.bank_address)}</td><td>${escapeHtml(inq.bank_phone)}</td><td>${inq.inquiry_date || ''}</td><td>${isDup}</td>`;
            if (currentTab === "soft") html += `<td>${escapeHtml(inq.original_inquirer || '')}</td>`;
            html += `</tr>`;
        });
        html += `</tbody><table><div>Total: ${filtered.length} inquiries (${duplicatesSet.size} duplicate entries)</div>`;
        tableContainer.innerHTML = html;
        const stats = computeCumulativeStats(currentTab === "hard" ? hardInquiries : []);
        summaryStatsDiv.innerHTML = `<div class="status-badge">📊 Cumulative Hard: 1m:${stats.last1Month} | 2m:${stats.last2Months} | 3m:${stats.last3Months} | 6m:${stats.last6Months} | 12m:${stats.last12Months} | 24m:${stats.last24Months}</div>`;
        updateChart(stats);
        updateChexScoreDisplay(simExtraHard, simExtraHard12);
    }

    function updateChart(stats) {
        const ctx = document.getElementById('inquiryChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['1m','2m','3m','6m','12m','24m'], datasets: [{ label: 'Hard Inquiries (cumulative)', data: [stats.last1Month, stats.last2Months, stats.last3Months, stats.last6Months, stats.last12Months, stats.last24Months], backgroundColor: '#6750a4' }] },
            options: { responsive: true, maintainAspectRatio: true }
        });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // PDF extraction (unchanged, robust)
    async function extractFromPDF(arrayBuffer) {
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = '';
        for (let i = 0; i < pdf.numPages; i++) {
            const page = await pdf.getPage(i+1);
            const content = await page.getTextContent();
            fullText += content.items.map(item => item.str).join(' ') + '\n';
            updateProgress(Math.round(((i+1)/pdf.numPages)*100));
        }
        const hardPatterns = [/Inquiries Viewed By Others/i, /Hard Inquiries/i, /Inquiries Shared With Others/i];
        const softPatterns = [/Inquiries Viewed Only By You/i, /Soft Inquiries/i, /Inquiries Viewed Only By Consumer/i];
        let hardSection = "", softSection = "";
        for(let pat of hardPatterns) { let match = fullText.match(new RegExp(`(${pat.source})([\\s\\S]*?)(?=${softPatterns.map(p=>p.source).join('|')}|$)`, 'i')); if(match) { hardSection = match[2]; break; } }
        for(let pat of softPatterns) { let match = fullText.match(new RegExp(`(${pat.source})([\\s\\S]*?)(?=${hardPatterns.map(p=>p.source).join('|')}|$)`, 'i')); if(match) { softSection = match[2]; break; } }
        if(!hardSection && !softSection) throw new Error("Could not detect inquiry sections.");
        
        function parseHardInquiriesSection(text) {
            const regex = /Inquirer:\s*(.*?)[;,\n]\s*(.*?)\s*Phone Number:\s*(.*?)[\s\n]+Inquiry Date:\s*(\d{2}\/\d{2}\/\d{4})/gi;
            let results = [];
            let m;
            while ((m = regex.exec(text)) !== null) {
                let bankName = m[1].trim(), address = m[2].trim(), phone = m[3].trim(), dateRaw = m[4].trim();
                let normDate = normalizeDate(dateRaw);
                let dateObj = normDate ? new Date(normDate) : null;
                results.push({ bank_name: bankName, bank_address: address, bank_phone: phone, inquiry_date: normDate || dateRaw, _dateObj: dateObj });
            }
            return results;
        }
        function parseSoftInquiriesSection(text) {
            const blockPattern = /Inquirer:\s*(.*?)[;,\n]\s*(.*?)\s*Phone Number:\s*(.*?)[\s\n]+On Behalf Of:\s*(.*?)\s*Phone Number:\s*(.*?)[\s\n]+Inquiry Date:\s*(\d{2}\/\d{2}\/\d{4})/gi;
            let results = [];
            let match;
            while ((match = blockPattern.exec(text)) !== null) {
                let inquirerName = match[1].trim(), inquirerAddr = match[2].trim(), onBehalfName = match[4].trim(), onBehalfPhone = match[5].trim(), dateRaw = match[6].trim();
                let normDate = normalizeDate(dateRaw);
                let dateObj = normDate ? new Date(normDate) : null;
                results.push({ bank_name: onBehalfName, bank_address: inquirerAddr, bank_phone: onBehalfPhone, inquiry_date: normDate || dateRaw, _dateObj: dateObj, original_inquirer: inquirerName });
            }
            if (results.length === 0) {
                const simple = /Inquirer:\s*(.*?)[;,\n]\s*(.*?)\s*Phone Number:\s*(.*?)[\s\n]+Inquiry Date:\s*(\d{2}\/\d{2}\/\d{4})/gi;
                while ((match = simple.exec(text)) !== null) {
                    let bankName = match[1].trim(), address = match[2].trim(), phone = match[3].trim(), dateRaw = match[4].trim();
                    let normDate = normalizeDate(dateRaw);
                    let dateObj = normDate ? new Date(normDate) : null;
                    results.push({ bank_name: bankName, bank_address: address, bank_phone: phone, inquiry_date: normDate || dateRaw, _dateObj: dateObj, original_inquirer: null });
                }
            }
            return results;
        }
        let hard = hardSection ? parseHardInquiriesSection(hardSection) : [];
        let soft = softSection ? parseSoftInquiriesSection(softSection) : [];
        return { hard, soft };
    }

    async function processPDF(file) {
        clearError(); setStatus("Reading PDF..."); updateProgress(0);
        resultsCard.classList.add('hidden');
        try {
            const arrayBuffer = await file.arrayBuffer();
            const { hard, soft } = await extractFromPDF(arrayBuffer);
            if(hard.length===0 && soft.length===0) throw new Error("No inquiries found.");
            hardInquiries = hard; softInquiries = soft;
            currentFilterBank = ""; currentFilterDate = "";
            filterBankInput.value = ""; filterDateInput.value = "";
            simExtraHard=0; simExtraHard12=0;
            simExtraHardInput.value="0"; simExtraHard12Input.value="0";
            renderCurrentTab();
            resultsCard.classList.remove('hidden');
            setStatus(`Loaded: ${hardInquiries.length} hard, ${softInquiries.length} soft (soft ignored for score)`);
            hideProgress();
        } catch(err) { showError(err.message); hideProgress(); }
    }

    // Session management with delete functionality
    function saveSession() {
        const data = { hard: hardInquiries, soft: softInquiries, scoreHistory, timestamp: new Date().toISOString() };
        localStorage.setItem('creditInquirySession', JSON.stringify(data));
        setStatus("Session saved");
    }
    function loadSession() {
        const raw = localStorage.getItem('creditInquirySession');
        if(!raw) { showError("No saved session found."); return; }
        try {
            const data = JSON.parse(raw);
            hardInquiries = data.hard || []; softInquiries = data.soft || [];
            scoreHistory = data.scoreHistory || [];
            currentFilterBank = ""; currentFilterDate = "";
            filterBankInput.value = ""; filterDateInput.value = "";
            simExtraHard=0; simExtraHard12=0;
            simExtraHardInput.value="0"; simExtraHard12Input.value="0";
            renderCurrentTab(); updateHistoryChart();
            resultsCard.classList.remove('hidden');
            setStatus(`Session loaded (${hardInquiries.length} hard, ${softInquiries.length} soft)`);
        } catch(e) { showError("Failed load session"); }
    }
    function deleteSession() {
        if (confirm("Are you sure you want to delete all saved sessions? This will also clear any loaded data from this session. The current PDF data will be lost.")) {
            localStorage.removeItem('creditInquirySession');
            // Optionally reset the current state to empty
            hardInquiries = [];
            softInquiries = [];
            scoreHistory = [];
            currentFilterBank = ""; currentFilterDate = "";
            filterBankInput.value = ""; filterDateInput.value = "";
            simExtraHard=0; simExtraHard12=0;
            simExtraHardInput.value="0"; simExtraHard12Input.value="0";
            renderCurrentTab();
            updateHistoryChart();
            resultsCard.classList.add('hidden');
            setStatus("All saved sessions deleted. You can upload a new PDF.");
            clearError();
        }
    }

    function exportToExcel() {
        const hardSheet = XLSX.utils.json_to_sheet(hardInquiries.map(({_dateObj, ...rest}) => rest));
        const softSheet = XLSX.utils.json_to_sheet(softInquiries.map(({_dateObj, ...rest}) => rest));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, hardSheet, "Hard Inquiries");
        XLSX.utils.book_append_sheet(wb, softSheet, "Soft Inquiries");
        XLSX.writeFile(wb, `chex_inquiries_${new Date().toISOString().slice(0,19)}.xlsx`);
    }

    function applySimulation() {
        simExtraHard = parseInt(simExtraHardInput.value,10) || 0;
        simExtraHard12 = parseInt(simExtraHard12Input.value,10) || 0;
        updateChexScoreDisplay(simExtraHard, simExtraHard12);
        setStatus(`Simulation active`);
    }
    function resetSimulation() {
        simExtraHard=0; simExtraHard12=0;
        simExtraHardInput.value="0"; simExtraHard12Input.value="0";
        updateChexScoreDisplay(0,0);
        setStatus("Simulation reset");
    }
    function updateCalibration() {
        calibFactor = parseFloat(calibSlider.value);
        calibValueSpan.innerText = calibFactor.toFixed(2);
        updateChexScoreDisplay(simExtraHard, simExtraHard12);
        setStatus(`Calibration factor = ${calibFactor.toFixed(2)}`);
    }
    function resetCalibration() {
        calibSlider.value = "1.00";
        calibFactor = 1.00;
        calibValueSpan.innerText = "1.00";
        updateChexScoreDisplay(simExtraHard, simExtraHard12);
        setStatus("Calibration reset to default (1.00)");
    }

    // Event listeners
    uploadZone.addEventListener('click', () => pdfInput.click());
    pdfInput.addEventListener('change', (e) => { if(e.target.files.length) processPDF(e.target.files[0]); });
    saveBtn.addEventListener('click', saveSession);
    loadBtn.addEventListener('click', loadSession);
    deleteSessionBtn.addEventListener('click', deleteSession);
    exportExcelBtn.addEventListener('click', exportToExcel);
    clearFiltersBtn.addEventListener('click', () => { currentFilterBank=""; currentFilterDate=""; filterBankInput.value=""; filterDateInput.value=""; renderCurrentTab(); });
    filterBankInput.addEventListener('input', (e) => { currentFilterBank = e.target.value; renderCurrentTab(); });
    filterDateInput.addEventListener('input', (e) => { currentFilterDate = e.target.value; renderCurrentTab(); });
    mergeDuplicatesBtn.addEventListener('click', () => {
        if(currentTab === "hard") hardInquiries = mergeDuplicates(hardInquiries);
        else softInquiries = mergeDuplicates(softInquiries);
        renderCurrentTab();
        setStatus("Duplicates merged");
    });
    applySimBtn.addEventListener('click', applySimulation);
    resetSimBtn.addEventListener('click', resetSimulation);
    clearHistoryBtn.addEventListener('click', clearHistory);
    calibSlider.addEventListener('input', updateCalibration);
    resetCalibBtn.addEventListener('click', resetCalibration);
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active'); currentTab = btn.dataset.type; renderCurrentTab();
    }));
    uploadZone.addEventListener('dragover', e=>e.preventDefault());
    uploadZone.addEventListener('drop', e=>{ e.preventDefault(); const file = e.dataTransfer.files[0]; if(file && file.type==='application/pdf') processPDF(file); else showError("Drop PDF"); });
</script>
</body>
</html>
