<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Secure Portal · Smart Launcher</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --md-sys-color-primary: #6750A4;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-primary-container: #EADDFF;
      --md-sys-color-on-primary-container: #21005E;
      --md-sys-color-surface: #FEF7FF;
      --md-sys-color-surface-variant: #E7E0EC;
      --md-sys-color-on-surface: #1C1B1F;
      --md-sys-color-on-surface-variant: #49454F;
      --md-sys-color-outline: #79747E;
      --md-sys-color-error: #BA1A1A;
      --md-elevation-1: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1);
      --md-elevation-2: 0 3px 6px -2px rgba(0,0,0,0.15), 0 2px 4px -1px rgba(0,0,0,0.1);
      --transition-default: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body.dark {
      --md-sys-color-primary: #D0BCFF;
      --md-sys-color-on-primary: #381E72;
      --md-sys-color-primary-container: #4F378A;
      --md-sys-color-on-primary-container: #EADDFF;
      --md-sys-color-surface: #1C1B1F;
      --md-sys-color-surface-variant: #2C2A30;  /* increased contrast */
      --md-sys-color-on-surface: #E6E1E5;
      --md-sys-color-on-surface-variant: #E6E1E5; /* made lighter for readability */
      --md-sys-color-outline: #938F99;
    }

    body {
      font-family: 'Google Sans', 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      transition: background-color 0.3s ease;
    }

    /* PIN MODAL */
    .pin-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
      animation: fadeIn 0.3s ease;
    }

    .pin-card {
      background: var(--md-sys-color-surface);
      border-radius: 28px;
      max-width: 360px;
      width: 100%;
      padding: 1.5rem 1.5rem 2rem;
      box-shadow: var(--md-elevation-2);
      text-align: center;
      animation: slideUp 0.25s ease-out;
    }

    .pin-card h2 {
      font-weight: 500;
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      color: var(--md-sys-color-primary);
    }

    .pin-card input {
      width: 100%;
      padding: 0.9rem 1rem;
      font-size: 1.2rem;
      text-align: center;
      background: var(--md-sys-color-surface-variant);
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 40px;
      color: var(--md-sys-color-on-surface);
      margin: 1rem 0;
      transition: var(--transition-default);
    }

    .pin-card input:focus {
      outline: none;
      border-color: var(--md-sys-color-primary);
      box-shadow: 0 0 0 3px rgba(103, 80, 164, 0.2);
    }

    .pin-card button {
      background: var(--md-sys-color-primary);
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 1rem;
      color: var(--md-sys-color-on-primary);
      cursor: pointer;
      width: 100%;
      transition: var(--transition-default);
    }

    .pin-card button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
      box-shadow: var(--md-elevation-1);
    }

    .error-msg {
      color: var(--md-sys-color-error);
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    /* MAIN APP */
    .main-app {
      display: none;
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem 1.5rem 2rem;
      animation: fadeInUp 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 0.5rem;
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--md-sys-color-primary), #C58AF9);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .header-actions {
      display: flex;
      gap: 0.8rem;
    }

    .icon-btn {
      background: var(--md-sys-color-surface-variant);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 32px;
      cursor: pointer;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--md-sys-color-on-surface);
      transition: var(--transition-default);
    }

    .icon-btn:hover {
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      transform: scale(0.96);
    }

    /* Cards */
    .card {
      background: var(--md-sys-color-surface);
      border-radius: 28px;
      padding: 1.5rem;
      margin-bottom: 1.8rem;
      box-shadow: var(--md-elevation-1);
      transition: var(--transition-default);
      border: 1px solid var(--md-sys-color-outline);
    }

    .card:hover {
      box-shadow: var(--md-elevation-2);
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-left: 0.5rem;
      border-left: 5px solid var(--md-sys-color-primary);
    }

    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin-bottom: 1rem;
    }

    .input-group {
      flex: 1;
      min-width: 200px;
    }

    .input-group label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      margin-bottom: 0.3rem;
      color: var(--md-sys-color-on-surface-variant);
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--md-sys-color-surface-variant);
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 40px;
      color: var(--md-sys-color-on-surface);
      font-size: 0.95rem;
      transition: var(--transition-default);
    }

    input:focus {
      outline: none;
      border-color: var(--md-sys-color-primary);
      box-shadow: 0 0 0 3px rgba(103, 80, 164, 0.2);
    }

    /* Preset chips */
    .presets-area {
      background: var(--md-sys-color-surface-variant);
      border-radius: 24px;
      padding: 1rem;
      margin-top: 0.5rem;
    }

    .presets-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 0.8rem;
    }

    .preset-check-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--md-sys-color-surface);
      padding: 0.4rem 1rem;
      border-radius: 40px;
      box-shadow: var(--md-elevation-1);
      transition: all 0.15s;
      cursor: pointer;
      border: 1px solid var(--md-sys-color-outline);
    }

    .preset-check-item:hover {
      transform: translateY(-2px);
      background: var(--md-sys-color-primary-container);
    }

    .preset-check-item input {
      width: 18px;
      height: 18px;
      accent-color: var(--md-sys-color-primary);
      margin: 0;
      cursor: pointer;
    }

    .preset-manager {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.8rem;
    }

    .small-btn {
      background: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-outline);
      padding: 0.3rem 1rem;
      border-radius: 32px;
      font-size: 0.75rem;
      cursor: pointer;
      color: var(--md-sys-color-on-surface);
      transition: var(--transition-default);
    }

    .small-btn:hover {
      background: var(--md-sys-color-primary-container);
      border-color: var(--md-sys-color-primary);
    }

    /* Scrollable lists */
    .urls-section {
      margin: 1rem 0;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .urls-section::-webkit-scrollbar {
      width: 6px;
    }

    .urls-section::-webkit-scrollbar-track {
      background: var(--md-sys-color-surface-variant);
      border-radius: 10px;
    }

    .urls-section::-webkit-scrollbar-thumb {
      background: var(--md-sys-color-primary);
      border-radius: 10px;
    }

    .select-all-bar {
      display: flex;
      justify-content: flex-end;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .select-all-btn {
      background: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-outline);
      padding: 0.3rem 1rem;
      border-radius: 32px;
      font-size: 0.75rem;
      cursor: pointer;
      color: var(--md-sys-color-on-surface);
      transition: var(--transition-default);
    }

    .select-all-btn:hover {
      background: var(--md-sys-color-primary-container);
    }

    .url-check-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 1rem;
      background: var(--md-sys-color-surface-variant);
      border-radius: 48px;
      margin-bottom: 0.6rem;
      transition: all 0.2s;
      border: 1px solid var(--md-sys-color-outline);
    }

    .url-check-item:hover {
      border-color: var(--md-sys-color-primary);
      transform: translateX(4px);
    }

    .url-check-item input {
      width: 1.2rem;
      height: 1.2rem;
      accent-color: var(--md-sys-color-primary);
    }

    .portal-label {
      font-weight: 500;
      font-size: 0.95rem;
      flex: 1;
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .btn-open {
      background: var(--md-sys-color-primary);
      border: none;
      padding: 0.7rem 1.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--md-sys-color-on-primary);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--md-elevation-1);
    }

    .btn-open:hover {
      transform: translateY(-2px);
      box-shadow: var(--md-elevation-2);
      filter: brightness(1.02);
    }

    footer {
      text-align: center;
      font-size: 0.7rem;
      margin-top: 2rem;
      color: var(--md-sys-color-on-surface-variant);
      opacity: 0.8;
    }
  </style>
</head>
<body>

<!-- PIN MODAL -->
<div id="pinModal" class="pin-overlay">
  <div class="pin-card">
    <h2>🔐 Secure Access</h2>
    <p style="margin-bottom: 0.5rem; opacity:0.7;">Enter PIN to continue</p>
    <input type="password" id="pinInput" placeholder="••••" maxlength="6" autocomplete="off">
    <button id="unlockBtn">Unlock Portal</button>
    <div id="pinError" class="error-msg"></div>
  </div>
</div>

<!-- MAIN APPLICATION -->
<div id="mainApp" class="main-app">
  <div class="app-header">
    <div class="logo"><h1>⚡ Material Portal</h1></div>
    <div class="header-actions">
      <button id="darkModeToggle" class="icon-btn">🌓 Theme</button>
      <button id="lockScreenBtn" class="icon-btn">🔒 Lock</button>
    </div>
  </div>

  <!-- Name & Multi-Preset Section -->
  <div class="card">
    <div class="card-title">📝 Enter Name (optional)</div>
    <div class="flex-row">
      <div class="input-group">
        <input type="text" id="nameInput" placeholder="e.g., john doe" autocomplete="off">
      </div>
    </div>
    <div class="card-title" style="margin-top: 0.5rem;">🏷️ Select Presets (multiple)</div>
    <div class="presets-area">
      <div id="presetsChecklist" class="presets-grid"></div>
      <div class="preset-manager">
        <button id="addPresetBtn" class="small-btn">➕ Add Preset</button>
        <button id="removeSelectedPresetsBtn" class="small-btn">✖ Remove selected</button>
      </div>
    </div>
    <div style="font-size: 0.75rem; margin-top: 0.8rem; opacity:0.8;">
      💡 Name entered → uses only name. Empty name → uses all checked presets.
    </div>
  </div>

  <!-- PREMIUM PORTALS -->
  <div class="card">
    <div class="card-title">✨ Premium Portals</div>
    <div class="select-all-bar">
      <button id="selectAllPremium" class="select-all-btn">✅ Select All</button>
      <button id="deselectAllPremium" class="select-all-btn">❌ Deselect All</button>
    </div>
    <div id="premiumListContainer" class="urls-section"></div>
    <div class="action-buttons">
      <button id="openPremiumBtn" class="btn-open">🚀 OPEN PREMIUM</button>
    </div>
  </div>

  <!-- OTHER SITES -->
  <div class="card">
    <div class="card-title">🌐 Other Sites</div>
    <div class="select-all-bar">
      <button id="selectAllOther" class="select-all-btn">✅ Select All</button>
      <button id="deselectAllOther" class="select-all-btn">❌ Deselect All</button>
    </div>
    <div id="otherListContainer" class="urls-section"></div>
    <div class="action-buttons">
      <button id="openOtherBtn" class="btn-open">🔗 OPEN OTHER</button>
    </div>
  </div>
  <footer>Default checked items are set in code (hardcoded).</footer>
</div>

<script>
  // ======================== SECURE PIN ==========================
  const CORRECT_PIN = "2407";

  // ======================== PORTALS WITH HARDCODED DEFAULT CHECKED ===========
  // Set defaultSelected: true/false to choose which are checked by default
  const PREMIUM_PORTALS = [
    { label: "Pre1 Portal", nameTemplate: "https://pre1.com/stars/{value}", presetTemplate: "https://pre1.com/tag/{value}", format: "hyphen", defaultSelected: true },
    { label: "Pre2 Dashboard", nameTemplate: "https://pre2.com/user/{value}", presetTemplate: "https://pre2.com/das/tag/{value}", format: "plus", defaultSelected: false },
    { label: "Premium3 Hub", nameTemplate: "https://premium3.net/profile/{value}", presetTemplate: "https://premium3.net/category/{value}", format: "percent20", defaultSelected: true },
    { label: "VIP Dashboard", nameTemplate: "https://vip.dashboard.io/stars/{value}/xxy", presetTemplate: "https://vip.dashboard.io/das/tag/{value}", format: "hyphen", defaultSelected: false }
  ];

  const OTHER_SITES = [
    { label: "Site1 Community", nameTemplate: "https://site1.com/member/{value}", presetTemplate: "https://site1.com/group/{value}", format: "hyphen", defaultSelected: true },
    { label: "Tools Other", nameTemplate: "https://tools.other.org/lookup?name={value}", presetTemplate: "https://tools.other.org/tag?q={value}", format: "plus", defaultSelected: false },
    { label: "Extrasite XYZ", nameTemplate: "https://extrasite.xyz/find/{value}/details", presetTemplate: "https://extrasite.xyz/tag/{value}", format: "percent20", defaultSelected: true },
    { label: "Community Net", nameTemplate: "https://community.net/user/{value}", presetTemplate: "https://community.net/tag/{value}", format: "hyphen", defaultSelected: false }
  ];

  // ======================== PRESETS ===============================
  let presetList = ["xyz", "guest", "default"];
  let selectedPresets = new Set(["xyz", "guest"]);

  // ======================== DOM elements ==========================
  const pinModal = document.getElementById('pinModal');
  const mainAppDiv = document.getElementById('mainApp');
  const pinInput = document.getElementById('pinInput');
  const unlockBtn = document.getElementById('unlockBtn');
  const pinErrorSpan = document.getElementById('pinError');
  const lockScreenBtn = document.getElementById('lockScreenBtn');
  const darkModeToggle = document.getElementById('darkModeToggle');
  const nameInput = document.getElementById('nameInput');
  const presetsChecklistDiv = document.getElementById('presetsChecklist');
  const addPresetBtn = document.getElementById('addPresetBtn');
  const removeSelectedPresetsBtn = document.getElementById('removeSelectedPresetsBtn');
  const premiumContainer = document.getElementById('premiumListContainer');
  const otherContainer = document.getElementById('otherListContainer');
  const openPremiumBtn = document.getElementById('openPremiumBtn');
  const openOtherBtn = document.getElementById('openOtherBtn');
  const selectAllPremiumBtn = document.getElementById('selectAllPremium');
  const deselectAllPremiumBtn = document.getElementById('deselectAllPremium');
  const selectAllOtherBtn = document.getElementById('selectAllOther');
  const deselectAllOtherBtn = document.getElementById('deselectAllOther');

  // Helper: format value
  function formatValue(rawValue, formatType) {
    let trimmed = rawValue.trim();
    if (trimmed === "") return "";
    switch(formatType) {
      case 'hyphen': return trimmed.replace(/\s+/g, '-');
      case 'plus': return trimmed.replace(/\s+/g, '+');
      case 'percent20': return trimmed.replace(/\s+/g, '%20');
      default: return trimmed.replace(/\s+/g, '-');
    }
  }

  function getActiveValues() {
    const nameValue = nameInput.value.trim();
    if (nameValue !== "") return [{ source: "name", value: nameValue }];
    const selected = Array.from(selectedPresets);
    if (selected.length === 0) return [{ source: "preset", value: "xyz" }];
    return selected.map(p => ({ source: "preset", value: p }));
  }

  // Render premium list with checkboxes based on defaultSelected
  function renderPremiumList() {
    premiumContainer.innerHTML = "";
    PREMIUM_PORTALS.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'url-check-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'premium-checkbox';
      cb.checked = item.defaultSelected;
      const labelSpan = document.createElement('span');
      labelSpan.className = 'portal-label';
      labelSpan.textContent = item.label;
      div.appendChild(cb);
      div.appendChild(labelSpan);
      premiumContainer.appendChild(div);
    });
  }

  function renderOtherList() {
    otherContainer.innerHTML = "";
    OTHER_SITES.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'url-check-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'other-checkbox';
      cb.checked = item.defaultSelected;
      const labelSpan = document.createElement('span');
      labelSpan.className = 'portal-label';
      labelSpan.textContent = item.label;
      div.appendChild(cb);
      div.appendChild(labelSpan);
      otherContainer.appendChild(div);
    });
  }

  // ========== PRESET CHECKBOX LOGIC ==========
  function renderPresetCheckboxes() {
    presetsChecklistDiv.innerHTML = "";
    presetList.forEach(preset => {
      const div = document.createElement('div');
      div.className = 'preset-check-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = preset;
      cb.checked = selectedPresets.has(preset);
      cb.addEventListener('change', (e) => {
        if (e.target.checked) selectedPresets.add(preset);
        else selectedPresets.delete(preset);
        savePresetsSelection();
      });
      const label = document.createElement('span');
      label.textContent = preset;
      div.appendChild(cb);
      div.appendChild(label);
      presetsChecklistDiv.appendChild(div);
    });
  }

  function savePresets() {
    localStorage.setItem('portal_presets_list', JSON.stringify(presetList));
    savePresetsSelection();
  }
  function savePresetsSelection() {
    localStorage.setItem('portal_selected_presets', JSON.stringify(Array.from(selectedPresets)));
  }
  function loadPresets() {
    const storedList = localStorage.getItem('portal_presets_list');
    if (storedList) {
      const parsed = JSON.parse(storedList);
      if (Array.isArray(parsed) && parsed.length) presetList = parsed;
      else presetList = ["xyz", "guest", "default"];
    } else presetList = ["xyz", "guest", "default"];
    const storedSelected = localStorage.getItem('portal_selected_presets');
    if (storedSelected) {
      const parsedSel = JSON.parse(storedSelected);
      if (Array.isArray(parsedSel)) {
        selectedPresets.clear();
        parsedSel.forEach(p => selectedPresets.add(p));
      } else { selectedPresets.clear(); selectedPresets.add("xyz"); if(presetList.includes("guest")) selectedPresets.add("guest"); }
    } else { selectedPresets.clear(); selectedPresets.add("xyz"); if(presetList.includes("guest")) selectedPresets.add("guest"); }
    renderPresetCheckboxes();
  }
  function addPreset() {
    let newPreset = prompt("Enter new preset:");
    if (newPreset && newPreset.trim()) {
      newPreset = newPreset.trim();
      if (!presetList.includes(newPreset)) {
        presetList.push(newPreset);
        selectedPresets.add(newPreset);
        savePresets();
        renderPresetCheckboxes();
      } else alert("Preset exists.");
    }
  }
  function removeSelectedPresets() {
    const toRemove = Array.from(selectedPresets).filter(p => p !== "xyz");
    if (toRemove.length === 0) { alert("Cannot remove 'xyz'. Select other presets."); return; }
    toRemove.forEach(p => {
      const idx = presetList.indexOf(p);
      if (idx !== -1) presetList.splice(idx, 1);
      selectedPresets.delete(p);
    });
    if (presetList.length === 0) presetList.push("xyz");
    if (selectedPresets.size === 0) selectedPresets.add("xyz");
    savePresets();
    renderPresetCheckboxes();
  }

  // Select/Deselect all
  function selectAllPremium() {
    document.querySelectorAll('.premium-checkbox').forEach(cb => cb.checked = true);
  }
  function deselectAllPremium() {
    document.querySelectorAll('.premium-checkbox').forEach(cb => cb.checked = false);
  }
  function selectAllOther() {
    document.querySelectorAll('.other-checkbox').forEach(cb => cb.checked = true);
  }
  function deselectAllOther() {
    document.querySelectorAll('.other-checkbox').forEach(cb => cb.checked = false);
  }

  // Open URLs
  function openUrlsForValue(activeValue, urlsArray, checkboxSelector) {
    const checkboxes = document.querySelectorAll(checkboxSelector);
    const selected = [];
    checkboxes.forEach((cb, idx) => { if (cb.checked) selected.push(idx); });
    if (selected.length === 0) return false;
    for (let idx of selected) {
      const entry = urlsArray[idx];
      if (!entry) continue;
      let template = (activeValue.source === "name") ? entry.nameTemplate : entry.presetTemplate;
      if (!template) continue;
      let formatted = formatValue(activeValue.value, entry.format);
      let url = template.replace(/\{value\}/g, formatted);
      if (!url.startsWith('http')) url = 'https://' + url;
      window.open(url, '_blank');
    }
    return true;
  }
  function openSelectedUrlsWithMultiPreset(urlsArray, checkboxSelector, categoryName) {
    const values = getActiveValues();
    if (values.length === 0) { alert("No name or preset selected."); return false; }
    const anyChecked = Array.from(document.querySelectorAll(checkboxSelector)).some(cb => cb.checked);
    if (!anyChecked) { alert(`No ${categoryName} selected.`); return false; }
    let msg = `Open ${categoryName} for: `;
    if (values.length === 1) msg += `"${values[0].value}"`;
    else msg += `${values.length} presets: ${values.map(v => v.value).join(", ")}`;
    if (!confirm(msg + " ?")) return false;
    for (let val of values) openUrlsForValue(val, urlsArray, checkboxSelector);
    return true;
  }

  // Dark mode
  function initDarkMode() {
    const stored = localStorage.getItem('theme');
    if (stored === 'dark') document.body.classList.add('dark');
    else if (stored === 'light') document.body.classList.remove('dark');
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.body.classList.add('dark');
  }
  function toggleDarkMode() {
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
  }

  // PIN lock/unlock
  function lockScreen() {
    sessionStorage.removeItem('portal_unlocked');
    pinModal.style.display = 'flex';
    mainAppDiv.style.display = 'none';
    pinInput.value = '';
    pinErrorSpan.innerText = '';
  }
  function unlockWithPin() {
    if (pinInput.value === CORRECT_PIN) {
      sessionStorage.setItem('portal_unlocked', 'true');
      pinModal.style.display = 'none';
      mainAppDiv.style.display = 'block';
      pinErrorSpan.innerText = '';
      loadPresets();
      renderPremiumList();
      renderOtherList();
    } else pinErrorSpan.innerText = '❌ Incorrect PIN.';
  }
  function checkSession() {
    if (sessionStorage.getItem('portal_unlocked') === 'true') {
      pinModal.style.display = 'none';
      mainAppDiv.style.display = 'block';
      loadPresets();
      renderPremiumList();
      renderOtherList();
    } else {
      pinModal.style.display = 'flex';
      mainAppDiv.style.display = 'none';
    }
  }

  function bindEvents() {
    unlockBtn.addEventListener('click', unlockWithPin);
    pinInput.addEventListener('keypress', e => e.key === 'Enter' && unlockWithPin());
    lockScreenBtn.addEventListener('click', lockScreen);
    darkModeToggle.addEventListener('click', toggleDarkMode);
    addPresetBtn.addEventListener('click', addPreset);
    removeSelectedPresetsBtn.addEventListener('click', removeSelectedPresets);
    openPremiumBtn.addEventListener('click', () => openSelectedUrlsWithMultiPreset(PREMIUM_PORTALS, '.premium-checkbox', "Premium Portals"));
    openOtherBtn.addEventListener('click', () => openSelectedUrlsWithMultiPreset(OTHER_SITES, '.other-checkbox', "Other Sites"));
    selectAllPremiumBtn.addEventListener('click', selectAllPremium);
    deselectAllPremiumBtn.addEventListener('click', deselectAllPremium);
    selectAllOtherBtn.addEventListener('click', selectAllOther);
    deselectAllOtherBtn.addEventListener('click', deselectAllOther);
  }

  initDarkMode();
  bindEvents();
  checkSession();
</script>
</body>
</html>
