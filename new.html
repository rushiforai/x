<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Secure Portal · Smart Launcher</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s;
    }

    :root {
      --bg-page: #f1f5f9;
      --surface: #ffffff;
      --surface-elevated: #f8fafc;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --border: #cbd5e1;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
    }

    body.dark {
      --bg-page: #0f172a;
      --surface: #1e293b;
      --surface-elevated: #0f172a;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border: #334155;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .pin-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }

    .pin-card {
      background: var(--surface);
      border-radius: 2rem;
      max-width: 400px;
      width: 100%;
      padding: 2rem;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4);
      text-align: center;
      border: 1px solid var(--border);
    }

    .pin-card h2 {
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .pin-card input {
      width: 100%;
      padding: 0.9rem;
      font-size: 1.2rem;
      text-align: center;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 2rem;
      color: var(--text-primary);
      margin: 1rem 0;
      letter-spacing: 2px;
    }

    .pin-card button {
      background: var(--accent);
      border: none;
      padding: 0.8rem 1.8rem;
      border-radius: 2rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      width: 100%;
    }

    .error-msg {
      color: #f87171;
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    .main-app {
      display: none;
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.8rem;
      padding-bottom: 0.8rem;
      border-bottom: 2px solid var(--border);
    }

    .logo h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .header-actions {
      display: flex;
      gap: 0.8rem;
    }

    .icon-btn {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-primary);
    }

    .card {
      background: var(--surface);
      border-radius: 1.5rem;
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-left: 4px solid var(--accent);
      padding-left: 0.8rem;
    }

    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      align-items: flex-end;
      margin-bottom: 1rem;
    }

    .input-group {
      flex: 1;
      min-width: 200px;
    }

    .input-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.3rem;
      color: var(--text-secondary);
    }

    input, select {
      width: 100%;
      padding: 0.7rem 1rem;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 1rem;
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    /* SCROLLABLE LISTS */
    .urls-section {
      margin: 1rem 0 1rem 0;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    /* Custom scrollbar for modern browsers */
    .urls-section::-webkit-scrollbar {
      width: 6px;
    }
    .urls-section::-webkit-scrollbar-track {
      background: var(--surface-elevated);
      border-radius: 10px;
    }
    .urls-section::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 10px;
    }

    .select-all-bar {
      display: flex;
      justify-content: flex-end;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .select-all-btn {
      background: var(--surface-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      border-radius: 1rem;
      cursor: pointer;
    }

    .url-check-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.7rem 0.8rem;
      background: var(--surface-elevated);
      border-radius: 1rem;
      margin-bottom: 0.6rem;
      border: 1px solid var(--border);
    }

    .url-check-item input[type="checkbox"] {
      width: 1.2rem;
      height: 1.2rem;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .portal-label {
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--text-primary);
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .btn-open {
      background: #10b981;
      padding: 0.7rem 1.5rem;
    }
    .btn-open:hover {
      background: #059669;
    }

    footer {
      text-align: center;
      font-size: 0.7rem;
      margin-top: 2rem;
      color: var(--text-secondary);
    }

    button {
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- PIN MODAL -->
<div id="pinModal" class="pin-overlay">
  <div class="pin-card">
    <h2>🔐 Secure Access</h2>
    <p style="margin-bottom: 0.5rem; color: var(--text-secondary);">Enter PIN to continue</p>
    <input type="password" id="pinInput" placeholder="••••" maxlength="6" autocomplete="off">
    <button id="unlockBtn">Unlock Portal</button>
    <div id="pinError" class="error-msg"></div>
  </div>
</div>

<!-- MAIN APPLICATION -->
<div id="mainApp" class="main-app">
  <div class="app-header">
    <div class="logo">
      <h1>⚡ Secret</h1>
    </div>
    <div class="header-actions">
      <button id="darkModeToggle" class="icon-btn">🌓</button>
      <button id="lockScreenBtn" class="icon-btn">🔒</button>
    </div>
  </div>

  <!-- Name & Preset Section -->
  <div class="card">
    <div class="card-title">📝 Enter Name</div>
    <div class="flex-row">
      <div class="input-group">
        <input type="text" id="nameInput" placeholder="e.g., john doe" autocomplete="off">
      </div>
      <div class="input-group">
        <label>Select Preset</label>
        <select id="presetSelect"></select>
      </div>
    </div>
    <div class="preset-manager" style="display: flex; gap:0.6rem; margin-top:0.5rem;">
      <button id="addPresetBtn" style="background: var(--surface-elevated); color: var(--text-primary); border:1px solid var(--border); padding:0.3rem 0.8rem; font-size:0.75rem;">➕ Add Preset</button>
      <button id="removePresetBtn" style="background: var(--surface-elevated); color: var(--text-primary); border:1px solid var(--border); padding:0.3rem 0.8rem; font-size:0.75rem;">✖ Remove selected</button>
    </div>
  </div>

  <!-- PREMIUM PORTALS (scrollable) -->
  <div class="card">
    <div class="card-title">✨ Premium Portals</div>
    <div class="select-all-bar">
      <button id="selectAllPremium" class="select-all-btn">✅ Select All</button>
      <button id="deselectAllPremium" class="select-all-btn">❌ Deselect All</button>
    </div>
    <div id="premiumListContainer" class="urls-section"></div>
    <div class="action-buttons">
      <button id="openPremiumBtn" class="btn-open">🚀 OPEN PREMIUM</button>
    </div>
  </div>

  <!-- OTHER SITES (scrollable) -->
  <div class="card">
    <div class="card-title">🌐 Other Sites</div>
    <div class="select-all-bar">
      <button id="selectAllOther" class="select-all-btn">✅ Select All</button>
      <button id="deselectAllOther" class="select-all-btn">❌ Deselect All</button>
    </div>
    <div id="otherListContainer" class="urls-section"></div>
    <div class="action-buttons">
      <button id="openOtherBtn" class="btn-open">🔗 OPEN OTHER</button>
    </div>
  </div>

  <footer>
    💡 Scrollable lists – add as many portals as you need. Each uses separate name/preset URL templates.<br>
    <code>{value}</code> is replaced with the formatted name/preset (hyphen, plus, or %20).
  </footer>
</div>

<script>
  // ======================== SECURE PIN ==========================
  const CORRECT_PIN = "2407";
  let isUnlocked = false;

  // ======================== DUAL TEMPLATE URLS WITH LABELS ======
  // Add as many items as you want – the container will scroll
  const PREMIUM_PORTALS = [
    { label: "Pre1 Portal", nameTemplate: "https://pre1.com/stars/{value}", presetTemplate: "https://pre1.com/tag/{value}", format: "hyphen" },
    { label: "Pre2 Dashboard", nameTemplate: "https://pre2.com/user/{value}", presetTemplate: "https://pre2.com/das/tag/{value}", format: "plus" },
    { label: "Premium3 Hub", nameTemplate: "https://premium3.net/profile/{value}", presetTemplate: "https://premium3.net/category/{value}", format: "percent20" },
    { label: "VIP Dashboard", nameTemplate: "https://vip.dashboard.io/stars/{value}/xxy", presetTemplate: "https://vip.dashboard.io/das/tag/{value}", format: "hyphen" },
    // Example extra items to demonstrate scrolling
    { label: "Extra Premium 1", nameTemplate: "https://extra1.com/{value}", presetTemplate: "https://extra1.com/tag/{value}", format: "hyphen" },
    { label: "Extra Premium 2", nameTemplate: "https://extra2.com/user/{value}", presetTemplate: "https://extra2.com/cat/{value}", format: "plus" }
  ];

  const OTHER_SITES = [
    { label: "Site1 Community", nameTemplate: "https://site1.com/member/{value}", presetTemplate: "https://site1.com/group/{value}", format: "hyphen" },
    { label: "Tools Other", nameTemplate: "https://tools.other.org/lookup?name={value}", presetTemplate: "https://tools.other.org/tag?q={value}", format: "plus" },
    { label: "Extrasite XYZ", nameTemplate: "https://extrasite.xyz/find/{value}/details", presetTemplate: "https://extrasite.xyz/tag/{value}", format: "percent20" },
    { label: "Community Net", nameTemplate: "https://community.net/user/{value}", presetTemplate: "https://community.net/tag/{value}", format: "hyphen" },
    { label: "Extra Other 1", nameTemplate: "https://other1.com/{value}", presetTemplate: "https://other1.com/preset/{value}", format: "hyphen" },
    { label: "Extra Other 2", nameTemplate: "https://other2.com/name/{value}", presetTemplate: "https://other2.com/tag/{value}", format: "percent20" }
  ];

  // ======================== PRESETS ===============================
  let presetList = ["xyz", "default", "guest"];

  // ======================== DOM elements ==========================
  const pinModal = document.getElementById('pinModal');
  const mainAppDiv = document.getElementById('mainApp');
  const pinInput = document.getElementById('pinInput');
  const unlockBtn = document.getElementById('unlockBtn');
  const pinErrorSpan = document.getElementById('pinError');
  const lockScreenBtn = document.getElementById('lockScreenBtn');
  const darkModeToggle = document.getElementById('darkModeToggle');
  const nameInput = document.getElementById('nameInput');
  const presetSelect = document.getElementById('presetSelect');
  const addPresetBtn = document.getElementById('addPresetBtn');
  const removePresetBtn = document.getElementById('removePresetBtn');
  const premiumContainer = document.getElementById('premiumListContainer');
  const otherContainer = document.getElementById('otherListContainer');
  const openPremiumBtn = document.getElementById('openPremiumBtn');
  const openOtherBtn = document.getElementById('openOtherBtn');
  const selectAllPremiumBtn = document.getElementById('selectAllPremium');
  const deselectAllPremiumBtn = document.getElementById('deselectAllPremium');
  const selectAllOtherBtn = document.getElementById('selectAllOther');
  const deselectAllOtherBtn = document.getElementById('deselectAllOther');

  // Helper: format value according to format type
  function formatValue(rawValue, formatType) {
    let trimmed = rawValue.trim();
    if (trimmed === "") return "";
    switch(formatType) {
      case 'hyphen': return trimmed.replace(/\s+/g, '-');
      case 'plus': return trimmed.replace(/\s+/g, '+');
      case 'percent20': return trimmed.replace(/\s+/g, '%20');
      default: return trimmed.replace(/\s+/g, '-');
    }
  }

  // Get active value and its source (name or preset)
  function getActiveValue() {
    const nameValue = nameInput.value.trim();
    if (nameValue !== "") return { source: "name", value: nameValue };
    const selectedPreset = presetSelect.value;
    return { source: "preset", value: selectedPreset || "xyz" };
  }

  // Render preset dropdown
  function renderPresetDropdown() {
    const currentVal = presetSelect.value;
    presetSelect.innerHTML = "";
    presetList.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      presetSelect.appendChild(opt);
    });
    if (currentVal && presetList.includes(currentVal)) presetSelect.value = currentVal;
    else presetSelect.value = presetList[0];
  }

  // Presets storage
  function savePresets() {
    localStorage.setItem('portal_presets', JSON.stringify(presetList));
  }

  function loadPresets() {
    const stored = localStorage.getItem('portal_presets');
    if (stored) {
      const parsed = JSON.parse(stored);
      if (Array.isArray(parsed) && parsed.length > 0) {
        presetList = parsed;
        if (!presetList.includes('xyz')) presetList.unshift('xyz');
      } else {
        presetList = ["xyz", "default", "guest"];
      }
    } else {
      presetList = ["xyz", "default", "guest"];
    }
    renderPresetDropdown();
  }

  function addPreset() {
    let newPreset = prompt("Enter new preset value:");
    if (newPreset && newPreset.trim() !== "") {
      newPreset = newPreset.trim();
      if (!presetList.includes(newPreset)) {
        presetList.push(newPreset);
        savePresets();
        renderPresetDropdown();
      } else {
        alert("Preset already exists.");
      }
    }
  }

  function removeCurrentPreset() {
    const toRemove = presetSelect.value;
    if (!toRemove) return;
    if (toRemove === "xyz") {
      alert("❌ Cannot remove 'xyz' — required fallback preset.");
      return;
    }
    const idx = presetList.indexOf(toRemove);
    if (idx !== -1) {
      presetList.splice(idx, 1);
      savePresets();
      renderPresetDropdown();
    }
  }

  // Render scrollable lists (friendly labels only)
  function renderPremiumList() {
    premiumContainer.innerHTML = "";
    PREMIUM_PORTALS.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'url-check-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'premium-checkbox';
      cb.checked = true;
      const labelSpan = document.createElement('span');
      labelSpan.className = 'portal-label';
      labelSpan.textContent = item.label;
      div.appendChild(cb);
      div.appendChild(labelSpan);
      premiumContainer.appendChild(div);
    });
  }

  function renderOtherList() {
    otherContainer.innerHTML = "";
    OTHER_SITES.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'url-check-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'other-checkbox';
      cb.checked = true;
      const labelSpan = document.createElement('span');
      labelSpan.className = 'portal-label';
      labelSpan.textContent = item.label;
      div.appendChild(cb);
      div.appendChild(labelSpan);
      otherContainer.appendChild(div);
    });
  }

  // Select/Deselect all
  function selectAllPremium() {
    document.querySelectorAll('.premium-checkbox').forEach(cb => cb.checked = true);
  }
  function deselectAllPremium() {
    document.querySelectorAll('.premium-checkbox').forEach(cb => cb.checked = false);
  }
  function selectAllOther() {
    document.querySelectorAll('.other-checkbox').forEach(cb => cb.checked = true);
  }
  function deselectAllOther() {
    document.querySelectorAll('.other-checkbox').forEach(cb => cb.checked = false);
  }

  // Open selected URLs using the appropriate template
  function openSelectedUrls(urlsArray, checkboxSelector, categoryName) {
    const active = getActiveValue();
    if (!active.value || active.value.trim() === "") {
      alert(`⚠️ No name entered and no preset selected. Please type a name or ensure a preset exists.`);
      return false;
    }

    const checkboxes = document.querySelectorAll(checkboxSelector);
    if (checkboxes.length === 0) {
      alert(`No ${categoryName} available.`);
      return false;
    }

    const selectedIndices = [];
    checkboxes.forEach((cb, idx) => {
      if (cb.checked) selectedIndices.push(idx);
    });
    if (selectedIndices.length === 0) {
      alert(`⚠️ No ${categoryName} selected. Use "Select All" or check individual items.`);
      return false;
    }

    const confirmMsg = `Open ${selectedIndices.length} selected ${categoryName} with ${active.source === "name" ? "name" : "preset"}: "${active.value}"?`;
    if (!confirm(confirmMsg)) return false;

    for (let idx of selectedIndices) {
      const entry = urlsArray[idx];
      if (!entry) continue;
      
      let template = (active.source === "name") ? entry.nameTemplate : entry.presetTemplate;
      if (!template || template.trim() === "") continue;
      
      let formattedValue = formatValue(active.value, entry.format);
      let finalUrl = template.replace(/\{value\}/g, formattedValue);
      
      if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
        finalUrl = 'https://' + finalUrl;
      }
      window.open(finalUrl, '_blank');
    }
    return true;
  }

  // Dark mode
  function initDarkMode() {
    const storedTheme = localStorage.getItem('theme');
    if (storedTheme === 'dark') {
      document.body.classList.add('dark');
    } else if (storedTheme === 'light') {
      document.body.classList.remove('dark');
    } else {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (prefersDark) document.body.classList.add('dark');
    }
  }
  function toggleDarkMode() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  }

  // PIN lock/unlock
  function lockScreen() {
    isUnlocked = false;
    sessionStorage.removeItem('portal_unlocked');
    pinModal.style.display = 'flex';
    mainAppDiv.style.display = 'none';
    pinInput.value = '';
    pinErrorSpan.innerText = '';
  }

  function unlockWithPin() {
    const entered = pinInput.value;
    if (entered === CORRECT_PIN) {
      isUnlocked = true;
      sessionStorage.setItem('portal_unlocked', 'true');
      pinModal.style.display = 'none';
      mainAppDiv.style.display = 'block';
      pinErrorSpan.innerText = '';
      loadPresets();
      renderPremiumList();
      renderOtherList();
    } else {
      pinErrorSpan.innerText = '❌ Incorrect PIN. Access denied.';
    }
  }

  function checkSession() {
    const unlockedSession = sessionStorage.getItem('portal_unlocked');
    if (unlockedSession === 'true') {
      isUnlocked = true;
      pinModal.style.display = 'none';
      mainAppDiv.style.display = 'block';
      loadPresets();
      renderPremiumList();
      renderOtherList();
    } else {
      pinModal.style.display = 'flex';
      mainAppDiv.style.display = 'none';
    }
  }

  // Bind events
  function bindEvents() {
    unlockBtn.addEventListener('click', unlockWithPin);
    pinInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') unlockWithPin(); });
    lockScreenBtn.addEventListener('click', lockScreen);
    darkModeToggle.addEventListener('click', toggleDarkMode);
    addPresetBtn.addEventListener('click', addPreset);
    removePresetBtn.addEventListener('click', removeCurrentPreset);
    
    openPremiumBtn.addEventListener('click', () => {
      openSelectedUrls(PREMIUM_PORTALS, '.premium-checkbox', "Premium Portals");
    });
    openOtherBtn.addEventListener('click', () => {
      openSelectedUrls(OTHER_SITES, '.other-checkbox', "Other Sites");
    });
    
    selectAllPremiumBtn.addEventListener('click', selectAllPremium);
    deselectAllPremiumBtn.addEventListener('click', deselectAllPremium);
    selectAllOtherBtn.addEventListener('click', selectAllOther);
    deselectAllOtherBtn.addEventListener('click', deselectAllOther);
  }

  function init() {
    initDarkMode();
    bindEvents();
    checkSession();
  }
  
  init();
</script>
</body>
</html>
