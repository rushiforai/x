<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Include Vue.js -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <style>
        body {
            margin: 0;
        }
        #pinOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        #pinOverlay .card {
            width: 100%;
            max-width: 380px;
            background: #1c1c1c;
            border: none;
        }
        #pinOverlay .form-control {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
        }
        #pinOverlay .btn-primary {
            background: #dc3545;
            border-color: #dc3545;
        }
        #pinOverlay .text-danger {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
<div id="app">
    <div id="pinOverlay" v-show="!pinAccepted">
        <div class="card p-4">
            <h5 class="card-title text-center mb-3">Enter PIN to Continue</h5>
            <form @submit.prevent="checkPin">
                <div class="form-group">
                    <input v-model="pinValue" class="form-control" type="password" placeholder="PIN" autofocus>
                </div>
                <button type="submit" class="btn btn-primary btn-center btn-block">Unlock</button>
                <p v-if="pinError" class="mt-3 text-danger text-center">{{ pinError }}</p>
            </form>
        </div>
    </div>

    <div class="container mt-5" v-show="pinAccepted">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h5 class="card-title text-center mb-4">Search</h5>
                <div class="form-group">
                    <input v-model="pcModel" class="form-control" type="search" placeholder="Enter Name">
                </div>
                <div class="mt-3">
                    <h6>Select Preset</h6>
                    <select class="form-control" v-model="selectedPreset">
                        <option v-for="preset in presets" :key="preset" :value="preset">{{ preset }}</option>
                    </select>
                </div>
                <div class="mt-3">
                    <h6>Premium Portals</h6>
                    <div class="d-flex flex-wrap">
                        <div v-for="portal in portals" :key="portal" class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" v-model="selectedPremium" :value="portal" :id="'premium-' + portal">
                            <label class="form-check-label" :for="'premium-' + portal">{{ portal }}</label>
                        </div>
                    </div>
                    <button @click="selectAllPremium" class="btn btn-sm btn-secondary mt-2">Select All</button>
                    <button @click="deselectAllPremium" class="btn btn-sm btn-outline-secondary mt-2 ml-2">Deselect All</button>
                </div>
                <div class="mt-3">
                    <h6>Other Sites</h6>
                    <div class="d-flex flex-wrap" style="max-height: 200px; overflow-y: auto;">
                        <div v-for="site in builtSites" :key="site" class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" v-model="selectedOthers" :value="site" :id="'other-' + site">
                            <label class="form-check-label" :for="'other-' + site">{{ site.split('/')[2] }}</label>
                        </div>
                    </div>
                    <button @click="selectAllOthers" class="btn btn-sm btn-secondary mt-2">Select All</button>
                    <button @click="deselectAllOthers" class="btn btn-sm btn-outline-secondary mt-2 ml-2">Deselect All</button>
                </div>
                <button @click="openPremiumContentPortals" class="btn btn-danger btn-block mt-3">Vixen</button>
                <button @click="openOtherSites" class="btn btn-outline-danger btn-block mt-3">Other Sites</button>
            </div>
        </div>
    </div>
</div>
</div>

<script>
  new Vue({
    el: '#app',
    data: {
      pinValue: '',
      pinAccepted: false,
      pinError: '',
      pcModel: '',
      portals: [
        "vixen.com",
        "tushy.com",
        "tushyraw.com",
        "blacked.com",
        "blackedraw.com",
        "deeper.com",

      selectedPremium: [],

        'bbc',

      ],
      selectedPreset: 'bbc',
    },
    computed: {
      builtSites() {
        const originalPcModel = this.pcModel.trim();
        const pcModelKebab = originalPcModel.replace(/\s+/g, "-").toLowerCase();
        const pcModelKebab1 = originalPcModel.replace(/\s+/g, "+").toLowerCase();
        const pcModelKebab2 = originalPcModel.replace(/\s+/g, "%20").toLowerCase();

          `https://hqpornero.com/tags/${pcModelKebab}.html`,
          `https://pornhoarder.tw/search/?search=${pcModelKebab2}`,
          `https://sxyprn.com/${pcModelKebab}.html`,
          `https://mat6tube.com/video/${pcModelKebab2}?sort=1`,
          `https://www.fpo.xxx/models/${pcModelKebab}/`,
          `https://www.fpo.xxx/search/${pcModelKebab}/`,
          `https://www.xfreehd.com/search?search_query=${pcModelKebab}&search_type=videos&o=lg`,
          `https://fux.com/pornstar/${pcModelKebab}.html`,  
          `https://www.youporn.com/pornstar/${pcModelKebab}/duration/`,
          `https://www.pxxbay.com/?s=${pcModelKebab1}`,
          `https://whereismyporn.com/?s=${pcModelKebab1}`,
          `https://fullporner.com/pornstar/${pcModelKebab}`,
          `https://www.pornhits.com/videos.php?p=1&s=d&ps=${pcModelKebab}`,
          `https://porn4days.red/search/?s=${pcModelKebab1}`,
          `https://www.pornhd3x.tv/search/${pcModelKebab2}`,
          `https://fullvideosporn.com/videos.php?p=1&q=${pcModelKebab2}`,
          `https://top.mega-xxx.name/tags/${pcModelKebab}/`,
          `https://pornrips.to/?s=${pcModelKebab1}`,
          `https://www.porntrex.com/models/${pcModelKebab}/longest/`,
        ];
      }
    },
    methods: {
      checkPin() {
        const correctPin = '1234';
        if (this.pinValue === correctPin) {
          this.pinAccepted = true;
          this.pinError = '';
        } else {
          this.pinError = 'Invalid PIN. Please try again.';
          this.pinValue = '';
        }
      },
      openUrl(url) {
        window.open(url, Math.random());
      },
      openPremiumContentPortals() {
        const originalPcModel = this.pcModel.trim();
        const pcModelKebab = originalPcModel.replace(/\s+/g, "-").toLowerCase();
        this.selectedPremium.forEach((portal) => {
          const url = `https://www.${portal}/performers/${pcModelKebab}`;
          this.openUrl(url);
        });
      },
      openOtherSites() {
        const preset = this.selectedPreset.trim();
        this.selectedOthers.forEach((site) => {
          const normalizedSite = site.endsWith('/') ? site.slice(0, -1) : site;
          this.openUrl(preset ? `${normalizedSite}/${preset}` : normalizedSite);
        });
      },
      openPremiumContentPortals() {
        const originalPcModel = this.pcModel.trim();
        const pcModelKebab = originalPcModel.replace(/\s+/g, "-").toLowerCase();
        const preset = this.selectedPreset.trim();
        this.selectedPremium.forEach((portal) => {
          const baseUrl = `https://www.${portal}/performers/${pcModelKebab}`;
          this.openUrl(preset ? `${baseUrl}/${preset}` : baseUrl);
        });
      },
      selectAllPremium() {
        this.selectedPremium = [...this.portals];
      },
      deselectAllPremium() {
        this.selectedPremium = [];
      },
      selectAllOthers() {
        this.selectedOthers = [...this.builtSites];
      },
      deselectAllOthers() {
        this.selectedOthers = [];
      },

    },
  });
</script>

</body>
</html>
