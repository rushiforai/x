<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churning Helpers</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fef7ff;
            font-family: 'Roboto', sans-serif;
            padding: 24px 16px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: #FFFBFE;
            border-radius: 12px;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
            padding: 24px 20px;
            margin-bottom: 28px;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 500;
        }
        h2 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 16px;
            text-align: center;
        }
        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            justify-content: center;
        }
        .input-group {
            flex: 1;
            min-width: 160px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #49454F;
            text-align: center;
        }
        input, select {
            background: #E7E0EC;
            border: 1px solid #79747E;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 1rem;
            font-family: inherit;
            text-align: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
        }
        .btn-primary {
            background: #6750A4;
            color: white;
        }
        .btn-primary:hover {
            background: #4f378a;
        }
        .btn-outline {
            border: 1px solid #79747E;
            color: #6750A4;
        }
        .btn-outline:hover {
            background: rgba(103, 80, 164, 0.08);
        }
        .btn-danger {
            color: #BA1A1A;
            border: 1px solid #BA1A1A;
        }
        .btn-danger:hover {
            background: #FFDAD6;
        }
        .btn-notify {
            background: #EADDFF;
            color: #21005E;
            border: none;
        }
        .btn-notify:hover {
            background: #d4c4f0;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 700px;
        }
        .data-table th {
            text-align: center;
            padding: 16px 12px;
            background-color: #f3edf7;
            font-weight: 500;
            color: #1C1B1F;
        }
        .data-table td {
            text-align: center;
            padding: 16px 12px;
            border-bottom: 1px solid #e2dce6;
            vertical-align: middle;
        }
        .data-table th:last-child,
        .data-table td:last-child {
            width: 100px;
        }
        .next-churn-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .churn-date {
            font-weight: 600;
            color: #21005E;
        }
        .days-badge {
            font-size: 0.7rem;
            background: #EADDFF;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            width: fit-content;
            font-weight: 500;
        }
        .days-badge.overdue {
            background: #FFDAD6;
            color: #BA1A1A;
        }
        .days-badge.today {
            background: #FFE6CC;
            color: #B85C00;
        }
        .action-icons {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #49454F;
        }
        .icon-btn:hover {
            background: rgba(0,0,0,0.08);
        }
        .material-symbols-outlined {
            font-size: 20px;
        }
        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #49454F;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }
        .snack-message {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1c1b1f;
            color: white;
            padding: 10px 24px;
            border-radius: 28px;
            font-size: 0.875rem;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 1px 2px 0 rgba(0,0,0,0.3);
            animation: fadeOut 3s forwards;
            pointer-events: none;
        }
        @keyframes fadeOut {
            0% { opacity: 1; visibility: visible; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 12px;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span class="material-symbols-outlined" style="font-size: 32px; color: #6750A4;">autorenew</span>
                <h1>Churning Helper</h1>
            </div>
            <div style="display: flex; gap: 12px;">
                <button id="notifyBtn" class="btn btn-notify">
                    <span class="material-symbols-outlined">notifications</span> Enable Notifications
                </button>
                <button id="clearAllBtn" class="btn btn-outline btn-danger">
                    <span class="material-symbols-outlined">delete_sweep</span> Clear all data
                </button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2><span id="formTitle">➕ Add new account</span></h2>
        <div class="form-grid">
            <div class="input-group">
                <label>Account name</label>
                <input type="text" id="accountName" placeholder="e.g., Chime">
            </div>
            <div class="input-group">
                <label>Closed date</label>
                <input type="date" id="closedDate">
            </div>
            <div class="input-group">
                <label>Cooling period (days)</label>
                <select id="coolingPeriodSelect"></select>
            </div>
            <div>
                <button id="submitBtn" class="btn btn-primary">
                    <span class="material-symbols-outlined">add</span> Add entry
                </button>
                <button id="cancelEditBtn" class="btn btn-outline" style="display: none;">
                    <span class="material-symbols-outlined">close</span> Cancel
                </button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="flex-between">
            <h2>📋 Churning log</h2>
            <span id="recordCount" style="background:#EADDFF; padding:4px 12px; border-radius:30px;">0 records</span>
        </div>
        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Closed date</th>
                        <th>Cooling Period (days)</th>
                        <th>Next Churn</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row"><td colspan="5">✨ No accounts yet. Add your first account ✨</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ---------- Data ----------
    let entries = [];
    let editModeId = null;
    let notificationPermissionGranted = false;
    let notificationCheckInterval = null;

    // DOM elements
    const accountNameInput = document.getElementById('accountName');
    const closedDateInput = document.getElementById('closedDate');
    const coolingSelect = document.getElementById('coolingPeriodSelect');
    const submitBtn = document.getElementById('submitBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const formTitleSpan = document.getElementById('formTitle');
    const tableBody = document.getElementById('tableBody');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const recordCountSpan = document.getElementById('recordCount');
    const notifyBtn = document.getElementById('notifyBtn');

    // ---------- Notification Helpers ----------
    function requestNotificationPermission() {
        if (!("Notification" in window)) {
            showSnackbar("❌ Your browser does not support notifications");
            return;
        }
        if (Notification.permission === "granted") {
            notificationPermissionGranted = true;
            showSnackbar("✅ Notifications already enabled");
            checkAndSendNotifications(); // immediate check
        } else if (Notification.permission !== "denied") {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    notificationPermissionGranted = true;
                    showSnackbar("🔔 Notifications enabled! You'll be alerted when cooling periods end.");
                    checkAndSendNotifications();
                } else {
                    showSnackbar("❌ Notification permission denied");
                }
            });
        } else {
            showSnackbar("❌ Notifications blocked. Please allow in browser settings.");
        }
    }

    // Get stored last notification dates (map of entryId -> lastNotifiedDateUTC string)
    function getLastNotifiedMap() {
        const stored = localStorage.getItem('churning_last_notified');
        return stored ? JSON.parse(stored) : {};
    }

    function setLastNotifiedMap(map) {
        localStorage.setItem('churning_last_notified', JSON.stringify(map));
    }

    // Send notification for a specific entry if not already sent for this "ended" state
    function sendNotificationForEntry(entry, nextChurnUTC) {
        if (!notificationPermissionGranted) return false;
        const lastMap = getLastNotifiedMap();
        const todayUTC = getTodayUTC();
        const nextDateStr = nextChurnUTC.toISOString().split('T')[0]; // YYYY-MM-DD
        const key = entry.id.toString();
        // Only send if we haven't sent a notification for this entry after the next churn date became <= today
        const lastNotified = lastMap[key];
        if (lastNotified && lastNotified >= nextDateStr) {
            return false; // already notified for this ending date
        }
        // Send notification
        const options = {
            body: `Cooling period for "${entry.name}" ended on ${formatUTCDate(nextChurnUTC)}. You can churn now!`,
            icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%236750A4"%3E%3Cpath d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 13c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z"/%3E%3C/svg%3E',
            silent: false,
        };
        new Notification(`🔔 Churning Helper: ${entry.name}`, options);
        // Update last notified
        lastMap[key] = nextDateStr;
        setLastNotifiedMap(lastMap);
        return true;
    }

    // Check all entries and send notifications if cooling period ended (next churn <= today)
    function checkAndSendNotifications() {
        if (!notificationPermissionGranted) return;
        const todayUTC = getTodayUTC();
        let anySent = false;
        for (const entry of entries) {
            const nextUTC = computeNextChurnUTC(entry.closedDateISO, entry.coolingPeriod);
            if (!nextUTC) continue;
            if (nextUTC <= todayUTC) {
                if (sendNotificationForEntry(entry, nextUTC)) anySent = true;
            }
        }
        if (anySent) {
            // re-render to update badges (days left may change to overdue)
            renderTable();
        }
    }

    // Clear all notification history (useful when clearing data)
    function clearNotificationHistory() {
        localStorage.removeItem('churning_last_notified');
    }

    // ---------- UTC helpers (same as before) ----------
    function parseUTCDate(iso) {
        if (!iso) return null;
        const [y, m, d] = iso.split('-').map(Number);
        return new Date(Date.UTC(y, m-1, d));
    }
    function formatUTCDate(utcDate) {
        if (!utcDate || isNaN(utcDate)) return '—';
        return `${utcDate.getUTCMonth()+1}/${utcDate.getUTCDate()}/${utcDate.getUTCFullYear()}`;
    }
    function computeNextChurnUTC(closedISO, days) {
        if (!closedISO) return null;
        const closed = parseUTCDate(closedISO);
        if (!closed) return null;
        const next = new Date(closed);
        next.setUTCDate(closed.getUTCDate() + days);
        return next;
    }
    function getTodayUTC() {
        const now = new Date();
        return new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
    }
    function daysBetween(d1, d2) {
        return Math.round((d2 - d1) / (1000*60*60*24));
    }
    function getDaysLeft(nextUTC) {
        if (!nextUTC) return null;
        return daysBetween(getTodayUTC(), nextUTC);
    }
    function formatDaysLeft(days) {
        if (days === null) return '';
        if (days === 0) return '🎯 Today';
        if (days > 0) return `${days} day${days !== 1 ? 's' : ''} left`;
        return `⚠️ ${Math.abs(days)} day${Math.abs(days) !== 1 ? 's' : ''} overdue`;
    }

    // Dropdown (0-365 days)
    function buildCoolingDropdown() {
        coolingSelect.innerHTML = '';
        for (let i = 0; i <= 365; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `${i} day${i !== 1 ? 's' : ''}`;
            if (i === 30) opt.selected = true;
            coolingSelect.appendChild(opt);
        }
    }

    // Persist to localStorage
    function persist() {
        localStorage.setItem('churning_helper_data', JSON.stringify(entries));
    }
    function loadData() {
        const stored = localStorage.getItem('churning_helper_data');
        if (stored) {
            entries = JSON.parse(stored);
        } else {
            entries = [
                { id: Date.now()+1, name: 'Chime', closedDateISO: '2026-04-14', coolingPeriod: 34 }
            ];
            persist();
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    function renderTable() {
        if (!entries.length) {
            tableBody.innerHTML = '<tr class="empty-row"><td colspan="5">✨ No accounts yet. Add your first account ✨</td></tr>';
            recordCountSpan.innerText = '0 records';
            return;
        }
        let html = '';
        for (const entry of entries) {
            const closedDateObj = parseUTCDate(entry.closedDateISO);
            const closedFmt = closedDateObj ? formatUTCDate(closedDateObj) : '—';
            const nextUTC = computeNextChurnUTC(entry.closedDateISO, entry.coolingPeriod);
            const nextFmt = nextUTC ? formatUTCDate(nextUTC) : '—';
            const daysLeft = getDaysLeft(nextUTC);
            const badgeText = formatDaysLeft(daysLeft);
            let badgeClass = 'days-badge';
            if (daysLeft !== null && daysLeft < 0) badgeClass += ' overdue';
            else if (daysLeft !== null && daysLeft === 0) badgeClass += ' today';

            html += `
                <tr data-id="${entry.id}">
                    <td><strong>${escapeHtml(entry.name)}</strong></td>
                    <td>${closedFmt}</td>
                    <td>${entry.coolingPeriod} day${entry.coolingPeriod !== 1 ? 's' : ''}</td>
                    <td>
                        <div class="next-churn-content">
                            <span class="churn-date">${nextFmt}</span>
                            ${badgeText ? `<span class="${badgeClass}">${badgeText}</span>` : ''}
                        </div>
                    </td>
                    <td class="action-icons">
                        <button class="icon-btn edit-entry" data-id="${entry.id}" title="Edit">
                            <span class="material-symbols-outlined">edit</span>
                        </button>
                        <button class="icon-btn delete-entry" data-id="${entry.id}" title="Delete">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </td>
                </tr>
            `;
        }
        tableBody.innerHTML = html;
        recordCountSpan.innerText = `${entries.length} record${entries.length !== 1 ? 's' : ''}`;

        document.querySelectorAll('.edit-entry').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                startEditMode(parseInt(btn.dataset.id));
            });
        });
        document.querySelectorAll('.delete-entry').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteEntryById(parseInt(btn.dataset.id));
            });
        });
    }

    // CRUD operations with notification checks
    function addEntry() {
        const name = accountNameInput.value.trim();
        const closed = closedDateInput.value;
        const cooling = parseInt(coolingSelect.value, 10);
        if (!name) return showSnackbar('❌ Enter account name');
        if (!closed) return showSnackbar('❌ Select closing date');
        entries.push({ id: Date.now(), name, closedDateISO: closed, coolingPeriod: cooling });
        persist();
        renderTable();
        resetForm();
        showSnackbar(`✅ "${name}" added.`);
        checkAndSendNotifications(); // check if this new entry already ended
    }

    function updateEntry() {
        if (!editModeId) return;
        const name = accountNameInput.value.trim();
        const closed = closedDateInput.value;
        const cooling = parseInt(coolingSelect.value, 10);
        if (!name) return showSnackbar('❌ Name required');
        const idx = entries.findIndex(e => e.id === editModeId);
        if (idx === -1) return resetForm();
        entries[idx] = { ...entries[idx], name, closedDateISO: closed, coolingPeriod: cooling };
        persist();
        renderTable();
        resetForm();
        showSnackbar(`✏️ Updated "${name}"`);
        checkAndSendNotifications();
    }

    function deleteEntryById(id) {
        const entry = entries.find(e => e.id === id);
        if (!entry) return;
        if (confirm(`Delete "${entry.name}"?`)) {
            entries = entries.filter(e => e.id !== id);
            persist();
            renderTable();
            if (editModeId === id) resetForm();
            showSnackbar(`🗑️ Removed "${entry.name}"`);
            // remove from notification history too
            const lastMap = getLastNotifiedMap();
            delete lastMap[id];
            setLastNotifiedMap(lastMap);
        }
    }

    function clearAllData() {
        if (!entries.length) return showSnackbar('No data to clear');
        if (confirm('⚠️ Delete ALL accounts permanently?')) {
            entries = [];
            persist();
            renderTable();
            resetForm();
            clearNotificationHistory(); // also clear notification tracking
            showSnackbar('All data cleared');
        }
    }

    function startEditMode(id) {
        const entry = entries.find(e => e.id === id);
        if (!entry) return;
        editModeId = id;
        accountNameInput.value = entry.name;
        closedDateInput.value = entry.closedDateISO;
        coolingSelect.value = entry.coolingPeriod;
        formTitleSpan.innerHTML = '✏️ Edit account';
        submitBtn.innerHTML = '<span class="material-symbols-outlined">save</span> Update entry';
        cancelEditBtn.style.display = 'inline-flex';
    }

    function resetForm() {
        editModeId = null;
        accountNameInput.value = '';
        const today = new Date();
        closedDateInput.value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        coolingSelect.value = '30';
        formTitleSpan.innerHTML = '➕ Add new account';
        submitBtn.innerHTML = '<span class="material-symbols-outlined">add</span> Add entry';
        cancelEditBtn.style.display = 'none';
    }

    function onSubmit() {
        editModeId !== null ? updateEntry() : addEntry();
    }

    function cancelEdit() {
        if (editModeId) resetForm();
        showSnackbar('Edit cancelled');
    }

    function showSnackbar(msg) {
        const old = document.querySelector('.snack-message');
        if (old) old.remove();
        const div = document.createElement('div');
        div.className = 'snack-message';
        div.textContent = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    // Initialize periodic check (every 60 minutes)
    function startPeriodicNotificationCheck() {
        if (notificationCheckInterval) clearInterval(notificationCheckInterval);
        notificationCheckInterval = setInterval(() => {
            if (notificationPermissionGranted) {
                checkAndSendNotifications();
            }
        }, 60 * 60 * 1000); // 1 hour
    }

    // Initialization
    function init() {
        buildCoolingDropdown();
        loadData();
        renderTable();
        const today = new Date();
        closedDateInput.value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        submitBtn.onclick = onSubmit;
        cancelEditBtn.onclick = cancelEdit;
        clearAllBtn.onclick = clearAllData;
        notifyBtn.onclick = requestNotificationPermission;
        accountNameInput.onkeypress = e => { if (e.key === 'Enter') onSubmit(); };
        closedDateInput.onkeypress = e => { if (e.key === 'Enter') onSubmit(); };

        // Check if already granted
        if ("Notification" in window && Notification.permission === "granted") {
            notificationPermissionGranted = true;
            checkAndSendNotifications();
        }
        startPeriodicNotificationCheck();
    }
    init();
</script>
</body>
</html>
