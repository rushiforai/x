<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Churning Helper | Material Design v3</title>
    <!-- Material Icons & Roboto Font (MD3) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fef7ff;
            font-family: 'Roboto', system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 24px 16px;
            color: #1c1b1f;
        }

        /* Material Design 3 core tokens */
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005E;
            --md-sys-color-secondary: #625B71;
            --md-sys-color-surface: #FFFBFE;
            --md-sys-color-surface-variant: #E7E0EC;
            --md-sys-color-on-surface: #1C1B1F;
            --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-outline: #79747E;
            --md-sys-color-error: #BA1A1A;
            --md-sys-color-error-container: #FFDAD6;
            --md-sys-shadow-elevation-1: 0 1px 2px 0 rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
            --md-sys-shadow-elevation-2: 0 1px 2px 0 rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
            --md-sys-radius-md: 12px;
            --md-sys-radius-lg: 28px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Cards */
        .card {
            background: var(--md-sys-color-surface);
            border-radius: var(--md-sys-radius-md);
            box-shadow: var(--md-sys-shadow-elevation-1);
            padding: 24px 20px;
            margin-bottom: 28px;
            transition: box-shadow 0.2s;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
            gap: 12px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 500;
            letter-spacing: 0;
            color: var(--md-sys-color-on-surface);
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 16px;
            color: var(--md-sys-color-on-surface);
        }

        /* Form layout (MD3 style) */
        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }

        .input-group {
            flex: 1;
            min-width: 160px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--md-sys-color-on-surface-variant);
            letter-spacing: 0.5px;
        }

        input, select {
            background: var(--md-sys-color-surface-variant);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Roboto', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
            color: var(--md-sys-color-on-surface);
        }

        input:focus, select:focus {
            border-color: var(--md-sys-color-primary);
            outline: 2px solid rgba(103, 80, 164, 0.2);
        }

        /* Button styles MD3 */
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-family: 'Roboto', sans-serif;
            font-size: 0.875rem;
            letter-spacing: 0.1px;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.1s;
            border: none;
            background: transparent;
        }

        .btn-primary {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            box-shadow: var(--md-sys-shadow-elevation-1);
        }

        .btn-primary:hover {
            background: #4f378a;
            box-shadow: var(--md-sys-shadow-elevation-2);
        }

        .btn-outline {
            border: 1px solid var(--md-sys-color-outline);
            color: var(--md-sys-color-primary);
            background: transparent;
        }

        .btn-outline:hover {
            background: rgba(103, 80, 164, 0.08);
        }

        .btn-danger {
            color: var(--md-sys-color-error);
            border: 1px solid var(--md-sys-color-error);
        }

        .btn-danger:hover {
            background: #ffdad6;
        }

        /* Table wrapper */
        .table-wrapper {
            overflow-x: auto;
            border-radius: var(--md-sys-radius-md);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .data-table th {
            text-align: left;
            padding: 16px 12px;
            background-color: #f3edf7;
            color: var(--md-sys-color-on-surface-variant);
            font-weight: 500;
            font-size: 0.875rem;
        }

        .data-table td {
            padding: 16px 12px;
            border-bottom: 1px solid #e2dce6;
            color: var(--md-sys-color-on-surface);
        }

        .data-table tr:hover {
            background-color: rgba(103, 80, 164, 0.04);
        }

        .action-icons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 20px;
            transition: background 0.2s;
            color: var(--md-sys-color-on-surface-variant);
        }

        .icon-btn:hover {
            background: rgba(0, 0, 0, 0.08);
        }

        .material-symbols-outlined {
            font-size: 20px;
        }

        .empty-row td {
            text-align: center;
            padding: 40px;
            color: var(--md-sys-color-on-surface-variant);
            font-style: italic;
        }

        .clear-btn {
            background-color: #fff3f3;
            border-color: var(--md-sys-color-error);
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        /* snackbar style (inline feedback) */
        .snack-message {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1c1b1f;
            color: white;
            padding: 10px 24px;
            border-radius: 28px;
            font-size: 0.875rem;
            font-weight: 500;
            z-index: 1000;
            box-shadow: var(--md-sys-shadow-elevation-2);
            animation: fadeOut 3s forwards;
            pointer-events: none;
        }

        @keyframes fadeOut {
            0% { opacity: 1; visibility: visible; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Main Card: Header & Info -->
    <div class="card">
        <div class="card-header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span class="material-symbols-outlined" style="font-size: 32px; color: #6750A4;">autorenew</span>
                <h1>Churning Helper</h1>
            </div>
            <div class="btn-group">
                <button id="clearAllBtn" class="btn btn-outline btn-danger">
                    <span class="material-symbols-outlined">delete_sweep</span> Clear all data
                </button>
            </div>
        </div>
        <p style="color: #49454F; margin-top: 4px;">Track closed accounts & re-subscription eligibility — next churn date = closing date + cooling period.</p>
    </div>

    <!-- Form Card: Add / Edit Entry (Material Design 3) -->
    <div class="card">
        <h2>
            <span id="formTitle">➕ Add new account</span>
        </h2>
        <div class="form-grid">
            <div class="input-group">
                <label>Account name *</label>
                <input type="text" id="accountName" placeholder="e.g., Netflix, Spotify" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Closed date *</label>
                <input type="date" id="closedDate" value="2026-04-14">
            </div>
            <div class="input-group">
                <label>Cooling period (days)</label>
                <select id="coolingPeriodSelect"></select>
            </div>
            <div class="btn-group" style="align-items: flex-end;">
                <button id="submitBtn" class="btn btn-primary">
                    <span class="material-symbols-outlined">add</span> Add entry
                </button>
                <button id="cancelEditBtn" class="btn btn-outline" style="display: none;">
                    <span class="material-symbols-outlined">close</span> Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Table Card -->
    <div class="card">
        <div class="flex-between">
            <h2>📋 Churning log</h2>
            <span style="font-size: 0.8rem; background: #EADDFF; padding: 4px 12px; border-radius: 30px;" id="recordCount">0 records</span>
        </div>
        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Closed date</th>
                    <th>Cooling Period (days)</th>
                    <th>Next Churn</th>
                    <th style="width: 90px;">Actions</th>
                </tr>
                </thead>
                <tbody id="tableBody">
                <tr class="empty-row"><td colspan="5">No accounts yet. Add your first account ✨</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ---------- Data Model ----------
    let entries = [];         // each entry: { id, name, closedDateISO, coolingPeriod }
    let editModeId = null;   // if not null, we are editing this id

    // DOM elements
    const accountNameInput = document.getElementById('accountName');
    const closedDateInput = document.getElementById('closedDate');
    const coolingSelect = document.getElementById('coolingPeriodSelect');
    const submitBtn = document.getElementById('submitBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const formTitleSpan = document.getElementById('formTitle');
    const tableBody = document.getElementById('tableBody');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const recordCountSpan = document.getElementById('recordCount');

    // Helper: format YYYY-MM-DD -> MM/DD/YYYY (US style like example)
    function formatDateToMDY(isoDate) {
        if (!isoDate) return '—';
        const [year, month, day] = isoDate.split('-');
        if (!year || !month || !day) return isoDate;
        return `${parseInt(month)}/${parseInt(day)}/${year}`;
    }

    // Compute next churn: closedDateISO + coolingDays (integer) => formatted MM/DD/YYYY
    function computeNextChurn(closedDateISO, coolingDays) {
        if (!closedDateISO) return '—';
        const parts = closedDateISO.split('-');
        let year = parseInt(parts[0], 10);
        let month = parseInt(parts[1], 10) - 1; // JS months 0-index
        let day = parseInt(parts[2], 10);
        const dateObj = new Date(year, month, day);
        if (isNaN(dateObj.getTime())) return 'Invalid date';
        dateObj.setDate(dateObj.getDate() + coolingDays);
        const newMonth = dateObj.getMonth() + 1;
        const newDay = dateObj.getDate();
        const newYear = dateObj.getFullYear();
        return `${newMonth}/${newDay}/${newYear}`;
    }

    // Populate cooling dropdown (0-365)
    function buildCoolingDropdown() {
        coolingSelect.innerHTML = '';
        for (let i = 0; i <= 365; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `${i} day${i !== 1 ? 's' : ''}`;
            if (i === 30) option.selected = true; // default 30 days
            coolingSelect.appendChild(option);
        }
    }

    // Save to localStorage
    function persistData() {
        localStorage.setItem('churning_helper_data', JSON.stringify(entries));
    }

    // Load from localStorage & optionally seed demo data
    function loadData() {
        const stored = localStorage.getItem('churning_helper_data');
        if (stored) {
            entries = JSON.parse(stored);
        } else {
            // Seed demo data to showcase functionality (matches example)
            entries = [
                {
                    id: Date.now() + 1,
                    name: 'Netflix',
                    closedDateISO: '2026-04-14',
                    coolingPeriod: 4
                },
                {
                    id: Date.now() + 2,
                    name: 'Hulu',
                    closedDateISO: '2026-04-01',
                    coolingPeriod: 15
                },
                {
                    id: Date.now() + 3,
                    name: 'Amazon Prime',
                    closedDateISO: '2026-03-20',
                    coolingPeriod: 45
                }
            ];
            persistData();
        }
    }

    // Render table from entries, compute Next Churn dynamically
    function renderTable() {
        if (!tableBody) return;
        if (!entries.length) {
            tableBody.innerHTML = '<tr class="empty-row"><td colspan="5">✨ No accounts yet. Add your first account ✨</td></tr>';
            recordCountSpan.innerText = `0 records`;
            return;
        }
        let html = '';
        for (const entry of entries) {
            const closedDateFormatted = formatDateToMDY(entry.closedDateISO);
            const nextChurnDate = computeNextChurn(entry.closedDateISO, entry.coolingPeriod);
            html += `
                <tr data-id="${entry.id}">
                    <td><strong>${escapeHtml(entry.name)}</strong></td>
                    <td>${closedDateFormatted}</td>
                    <td>${entry.coolingPeriod} day${entry.coolingPeriod !== 1 ? 's' : ''}</td>
                    <td style="font-weight: 500; color:#21005E;">${nextChurnDate}</td>
                    <td class="action-icons">
                        <button class="icon-btn edit-entry" data-id="${entry.id}" title="Edit account">
                            <span class="material-symbols-outlined">edit</span>
                        </button>
                        <button class="icon-btn delete-entry" data-id="${entry.id}" title="Delete">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </td>
                </tr>
            `;
        }
        tableBody.innerHTML = html;
        recordCountSpan.innerText = `${entries.length} record${entries.length !== 1 ? 's' : ''}`;

        // Attach event listeners dynamically for edit/delete buttons
        document.querySelectorAll('.edit-entry').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                startEditMode(id);
            });
        });

        document.querySelectorAll('.delete-entry').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.getAttribute('data-id'));
                deleteEntryById(id);
            });
        });
    }

    // simple XSS guard
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Add new entry
    function addEntry() {
        const name = accountNameInput.value.trim();
        const closedDate = closedDateInput.value;
        const coolingPeriod = parseInt(coolingSelect.value, 10);

        if (!name) {
            showSnackbar('❌ Please enter an account name');
            return;
        }
        if (!closedDate) {
            showSnackbar('❌ Please select a closing date');
            return;
        }
        if (isNaN(coolingPeriod)) {
            showSnackbar('❌ Invalid cooling period');
            return;
        }

        const newEntry = {
            id: Date.now(),
            name: name,
            closedDateISO: closedDate,
            coolingPeriod: coolingPeriod
        };
        entries.push(newEntry);
        persistData();
        renderTable();
        resetFormToAddMode();
        showSnackbar(`✅ "${name}" added. Next churn: ${computeNextChurn(closedDate, coolingPeriod)}`);
    }

    // Update existing entry
    function updateEntry() {
        if (editModeId === null) return;
        const name = accountNameInput.value.trim();
        const closedDate = closedDateInput.value;
        const coolingPeriod = parseInt(coolingSelect.value, 10);

        if (!name) {
            showSnackbar('❌ Name cannot be empty');
            return;
        }
        if (!closedDate) {
            showSnackbar('❌ Please select closing date');
            return;
        }

        const index = entries.findIndex(entry => entry.id === editModeId);
        if (index === -1) {
            showSnackbar('Error: entry not found');
            resetFormToAddMode();
            return;
        }

        entries[index] = {
            ...entries[index],
            name: name,
            closedDateISO: closedDate,
            coolingPeriod: coolingPeriod
        };
        persistData();
        renderTable();
        resetFormToAddMode();
        showSnackbar(`✏️ Updated "${name}" — next churn recalculated.`);
    }

    // Delete entry by id
    function deleteEntryById(id) {
        const entryToDelete = entries.find(e => e.id === id);
        if (!entryToDelete) return;
        if (confirm(`Delete "${entryToDelete.name}" from churning list?`)) {
            entries = entries.filter(entry => entry.id !== id);
            persistData();
            renderTable();
            // If we were editing the deleted item, cancel edit mode
            if (editModeId === id) {
                resetFormToAddMode();
            }
            showSnackbar(`🗑️ Removed "${entryToDelete.name}"`);
        }
    }

    // Clear all data (with confirmation)
    function clearAllData() {
        if (entries.length === 0) {
            showSnackbar('No data to clear');
            return;
        }
        if (confirm('⚠️ PERMANENT: Delete ALL accounts from the table? This action cannot be undone.')) {
            entries = [];
            persistData();
            renderTable();
            resetFormToAddMode();
            showSnackbar('All churning data cleared');
        }
    }

    // Start editing: fill form, switch UI to edit mode
    function startEditMode(id) {
        const entry = entries.find(e => e.id === id);
        if (!entry) return;

        editModeId = id;
        accountNameInput.value = entry.name;
        closedDateInput.value = entry.closedDateISO;
        coolingSelect.value = entry.coolingPeriod;

        // Update UI to edit state
        formTitleSpan.innerHTML = '✏️ Edit account';
        submitBtn.innerHTML = '<span class="material-symbols-outlined">save</span> Update entry';
        cancelEditBtn.style.display = 'inline-flex';
        submitBtn.classList.add('btn-primary');
        // scroll to form for better UX
        document.querySelector('.card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Reset form & back to "Add" mode
    function resetFormToAddMode() {
        editModeId = null;
        accountNameInput.value = '';
        // set default closed date to today? but keep previous example but empty? Let's set a sensible default: today's date
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        closedDateInput.value = `${yyyy}-${mm}-${dd}`;
        coolingSelect.value = '30';    // default 30 days
        formTitleSpan.innerHTML = '➕ Add new account';
        submitBtn.innerHTML = '<span class="material-symbols-outlined">add</span> Add entry';
        cancelEditBtn.style.display = 'none';
    }

    // Submit handler (depending on mode)
    function onSubmitAction() {
        if (editModeId !== null) {
            updateEntry();
        } else {
            addEntry();
        }
    }

    // Cancel edit: reset mode
    function cancelEdit() {
        if (editModeId !== null) {
            resetFormToAddMode();
            showSnackbar('Edit cancelled');
        }
    }

    // Snackbar notification (Material style)
    let snackbarTimeout;
    function showSnackbar(message, duration = 3000) {
        const existing = document.querySelector('.snack-message');
        if (existing) existing.remove();
        const snack = document.createElement('div');
        snack.className = 'snack-message';
        snack.innerText = message;
        document.body.appendChild(snack);
        setTimeout(() => {
            if (snack && snack.parentNode) snack.remove();
        }, duration);
    }

    // Recompute Next Churn on the fly? Already computed during render; but for live preview, no needed.
    // But we ensure local storage sync.

    // Initialize event listeners and populate dropdown
    function init() {
        buildCoolingDropdown();
        loadData();
        renderTable();

        // Set default closed date to today for fresh add
        const todayDate = new Date();
        const yyyy = todayDate.getFullYear();
        const mm = String(todayDate.getMonth() + 1).padStart(2, '0');
        const dd = String(todayDate.getDate()).padStart(2, '0');
        if (!closedDateInput.value) closedDateInput.value = `${yyyy}-${mm}-${dd}`;

        submitBtn.addEventListener('click', onSubmitAction);
        cancelEditBtn.addEventListener('click', cancelEdit);
        clearAllBtn.addEventListener('click', clearAllData);

        // Extra: if user presses enter in name field, trigger submit
        accountNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') onSubmitAction();
        });
        closedDateInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') onSubmitAction();
        });
    }

    // additional helper: recompute next churn anytime but already done via render.
    // Start app
    init();
</script>
</body>
</html>
